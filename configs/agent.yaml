# Cloud Flow Agent 配置文件

# Agent 配置
agent:
  hostname: ""  # 留空自动获取
  host_ip: ""   # 留空自动获取
  interval: 10  # 采集间隔（秒）

# Edge 连接配置
edge:
  address: "edge.example.com"
  port: 9090
  tls_enabled: false
  ca_file: "/etc/cloud-flow/ca.crt"
  cert_file: "/etc/cloud-flow/agent.crt"
  key_file: "/etc/cloud-flow/agent.key"
  timeout: 10      # 连接超时（秒）
  retry_max: 5     # 最大重试次数
  retry_delay: 5   # 重试间隔（秒）

# 采集器配置
collectors:
  # eBPF 采集器（高内核 >= 4.4）
  ebpf:
    enabled: true
    events:
      - tcp_connect
      - tcp_accept
      - tcp_close
      - tcp_sendmsg
      - tcp_recvmsg
    filter_ports: []   # 过滤端口，空表示全部
    filter_ips: []     # 过滤 IP，空表示全部
    sample_rate: 100   # 采样率 (1-100)
    buffer_size: 4096  # Perf buffer 大小

  # 传统采集器（低内核降级）
  traditional:
    enabled: true
    proc_path: "/proc"
    netlink_groups: []  # netlink 组

  # 系统指标采集器
  metrics:
    enabled: true
    interval: 10      # 采集间隔（秒）
    cpu: true
    memory: true
    disk: true
    disk_paths:
      - "/"
    network: true
    network_ifaces: []  # 空表示全部接口

  # 进程事件采集器
  process:
    enabled: true
    events:
      - exec
      - fork
      - exit
    filter_users: []   # 过滤用户 ID
    filter_comms: []   # 过滤进程名

# 资源限制
resources:
  cpu_quota: 1.0        # CPU 配额（核心数）
  memory_limit: 512     # 内存限制（MB）
  buffer_max_size: 100  # 缓冲区最大大小（MB）
  max_goroutines: 100   # 最大协程数

# 日志配置
logging:
  level: "info"       # debug, info, warn, error
  format: "json"      # json, text
  output: "stdout"    # stdout, file
  path: "/var/log/cloud-flow/agent.log"
  max_size: 100       # 单个日志文件最大大小（MB）
  max_backups: 5      # 最大备份文件数
  max_age: 30         # 最大保留天数
  compress: true      # 是否压缩

# ============================================================
# 双中心数据同步配置
# 支持双中心数据同步；单中心故障时，另一中心无缝接管
# ============================================================
dual_center:
  enabled: false              # 启用双中心同步（默认关闭）
  local_center_id: ""         # 本地中心ID
  local_center_name: ""       # 本地中心名称
  local_role: "primary"       # 本地角色: primary/secondary
  local_address: "0.0.0.0"    # 本地绑定地址
  local_port: 7947            # 本地同步端口
  region: "default"           # 区域

  # 对端中心列表
  peer_centers:
    # - id: "center-bj-02"
    #   name: "北京中心-备"
    #   role: "secondary"
    #   address: "192.168.1.200"
    #   port: 7947
    #   region: "beijing"
    #   tls_enabled: false

  # 同步配置
  sync_mode: "async"          # 同步模式: sync(同步)/async(异步)/semi_sync(半同步)
  batch_size: 500             # 批量大小
  flush_interval: 5           # 刷新间隔（秒）
  compress_enabled: true      # 启用压缩
  max_retries: 3              # 最大重试次数
  retry_delay: 2              # 重试间隔（秒）
  queue_size: 10000           # 队列大小
  queue_overflow: "drop_oldest" # 队列溢出策略: drop_latest/drop_oldest/block

# ============================================================
# 故障切换配置
# 单中心故障时，另一中心自动检测并无缝接管
# ============================================================
failover:
  enabled: false              # 启用故障切换（默认关闭）
  mode: "auto"                # 切换模式: auto(自动)/manual(手动)/semi_auto(半自动)

  # 故障检测
  heartbeat_interval: 3       # 心跳间隔（秒）
  heartbeat_timeout: 2        # 心跳超时（秒）
  failure_threshold: 3        # 连续失败次数触发切换
  success_threshold: 5        # 连续成功次数确认恢复

  # 切换配置
  switch_timeout: 30          # 切换超时（秒）
  pre_switch_delay: 2         # 切换前延迟（秒）
  graceful_shutdown: true     # 优雅关闭
  drain_timeout: 60           # 连接排空超时（秒）

  # 恢复配置
  auto_recover: true          # 自动恢复
  recover_delay: 30           # 恢复延迟（秒）
  data_repair_on_recover: true # 恢复时执行数据补偿

  # 防脑裂
  fence_enabled: true         # 启用围栏令牌
  fence_timeout: 10           # 围栏超时（秒）
  quorum_required: true       # 需要仲裁

# ============================================================
# 虚拟IP配置（可选）
# 用于故障切换时的流量重定向
# ============================================================
vip:
  enabled: false              # 启用虚拟IP（默认关闭）
  virtual_ip: ""              # 虚拟IP地址
  interface: ""               # 网络接口
  netmask: ""                 # 子网掩码

# ============================================================
# 熔断与降级配置
# 后端组件故障不影响整体服务，自动切换
# ============================================================
resilience:
  enabled: true               # 启用弹性管理（默认开启）
  health_check_interval: 10   # 健康检查间隔（秒）
  switch_timeout_sec: 30      # 切换超时（秒）
  graceful_degradation: true  # 优雅降级

  # 熔断器配置
  circuit_breaker:
    enabled: true             # 启用熔断器
    max_failures: 5           # 最大连续失败次数触发熔断
    reset_timeout_sec: 30     # 熔断恢复超时（秒）
    half_open_max: 3          # 半开状态最大探测数
    window_time_sec: 60       # 滑动窗口时间（秒）
    window_buckets: 10        # 滑动窗口桶数
    adaptive_enabled: true    # 自适应恢复超时（指数退避）
    timeout_sec: 10           # 单次执行超时（秒）

  # 降级策略
  policies:
    # eBPF采集器 → 传统采集器
    - component_id: "collector_ebpf"
      max_error_rate: 0.5
      max_errors: 10
      error_window_sec: 60
      fallback_to: "collector_traditional"
      auto_recover: true
      recover_after_sec: 120
      recover_threshold: 5

    # gRPC Edge连接 → 本地缓冲
    - component_id: "grpc_edge"
      max_error_rate: 0.5
      max_errors: 5
      error_window_sec: 30
      fallback_to: "local_buffer"
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 指标采集器（仅告警，无降级）
    - component_id: "collector_metrics"
      max_error_rate: 0.8
      max_errors: 20
      error_window_sec: 60
      fallback_to: ""
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 进程采集器（仅告警，无降级）
    - component_id: "collector_process"
      max_error_rate: 0.8
      max_errors: 20
      error_window_sec: 60
      fallback_to: ""
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 双中心同步 → 本地模式
    - component_id: "dual_center_sync"
      max_error_rate: 0.5
      max_errors: 5
      error_window_sec: 60
      fallback_to: "local_only"
      auto_recover: true
      recover_after_sec: 120
      recover_threshold: 5

# ============================================================
# VXLAN 隧道解封装配置
# 支持 VXLAN 隧道解封装，提取内层原始流量
# ============================================================
vxlan:
  enabled: false              # 启用 VXLAN 解封装（默认关闭）
  listen_port: 4789           # VXLAN 监听端口 (RFC 7348)
  filter_vni: []              # 过滤的 VNI 列表（空=全部）
  filter_src_ip: []           # 过滤的内层源 IP
  filter_dst_ip: []           # 过滤的内层目的 IP
  buffer_size: 65535          # 缓冲区大小
  max_packet_size: 9000       # 最大包大小（支持 Jumbo Frame）

# ============================================================
# 流量镜像配置
# 将解封装后的流量镜像至云下环境
# ============================================================
mirror:
  enabled: false              # 启用流量镜像（默认关闭）
  source_ip: ""               # 源 IP（用于封装，留空自动获取）
  source_port: 4789           # 源端口
  queue_size: 10000           # 队列大小
  batch_size: 100             # 批量发送大小
  batch_timeout: 100          # 批量发送超时（毫秒）

  # 流量过滤（可选）
  filter:
    src_ips: []               # 过滤源 IP
    dst_ips: []               # 过滤目的 IP
    src_ports: []             # 过滤源端口
    dst_ports: []             # 过滤目的端口
    protocols: []             # 过滤协议 (6=TCP, 17=UDP)
    vnis: []                  # 过滤 VNI
    sample_rate: 100          # 采样率 (1-100)

  # 镜像目标列表
  targets:
    # 示例1：通过 VXLAN 隧道镜像到云下
    # - name: "cloud-onprem-vxlan"
    #   mode: "vxlan"
    #   address: "192.168.100.10"
    #   port: 4789
    #   vni: 100
    #   enabled: true

    # 示例2：通过 GRE 隧道镜像
    # - name: "cloud-onprem-gre"
    #   mode: "gre"
    #   address: "192.168.100.20"
    #   port: 47
    #   gre_key: 1000
    #   enabled: true

    # 示例3：通过 UDP 封装镜像
    # - name: "cloud-onprem-udp"
    #   mode: "udp"
    #   address: "192.168.100.30"
    #   port: 5000
    #   enabled: true

    # 示例4：通过 ERSPAN 镜像
    # - name: "cloud-onprem-erspan"
    #   mode: "erspan"
    #   address: "192.168.100.40"
    #   port: 47
    #   erspan_id: 1
    #   enabled: true

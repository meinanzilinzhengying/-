# Cloud Flow Agent 配置文件

# Agent 配置
agent:
  hostname: ""  # 留空自动获取
  host_ip: ""   # 留空自动获取
  interval: 10  # 采集间隔（秒）

# Edge 连接配置
edge:
  address: "edge.example.com"
  port: 9090
  tls_enabled: false
  ca_file: "/etc/cloud-flow/ca.crt"
  cert_file: "/etc/cloud-flow/agent.crt"
  key_file: "/etc/cloud-flow/agent.key"
  timeout: 10      # 连接超时（秒）
  retry_max: 5     # 最大重试次数
  retry_delay: 5   # 重试间隔（秒）

# 采集器配置
collectors:
  # eBPF 采集器（高内核 >= 4.4）
  ebpf:
    enabled: true
    events:
      - tcp_connect
      - tcp_accept
      - tcp_close
      - tcp_sendmsg
      - tcp_recvmsg
    filter_ports: []   # 过滤端口，空表示全部
    filter_ips: []     # 过滤 IP，空表示全部
    sample_rate: 100   # 采样率 (1-100)
    buffer_size: 4096  # Perf buffer 大小

  # 传统采集器（低内核降级）
  traditional:
    enabled: true
    proc_path: "/proc"
    netlink_groups: []  # netlink 组

  # 系统指标采集器
  metrics:
    enabled: true
    interval: 10      # 采集间隔（秒）
    cpu: true
    memory: true
    disk: true
    disk_paths:
      - "/"
    network: true
    network_ifaces: []  # 空表示全部接口

  # 进程事件采集器
  process:
    enabled: true
    events:
      - exec
      - fork
      - exit
    filter_users: []   # 过滤用户 ID
    filter_comms: []   # 过滤进程名

# 资源限制
resources:
  cpu_quota: 1.0        # CPU 配额（核心数）
  memory_limit: 512     # 内存限制（MB）
  buffer_max_size: 100  # 缓冲区最大大小（MB）
  max_goroutines: 100   # 最大协程数

# 日志配置
logging:
  level: "info"       # debug, info, warn, error
  format: "json"      # json, text
  output: "stdout"    # stdout, file
  path: "/var/log/cloud-flow/agent.log"
  max_size: 100       # 单个日志文件最大大小（MB）
  max_backups: 5      # 最大备份文件数
  max_age: 30         # 最大保留天数
  compress: true      # 是否压缩

# ============================================================
# 双中心数据同步配置
# 支持双中心数据同步；单中心故障时，另一中心无缝接管
# ============================================================
dual_center:
  enabled: false              # 启用双中心同步（默认关闭）
  local_center_id: ""         # 本地中心ID
  local_center_name: ""       # 本地中心名称
  local_role: "primary"       # 本地角色: primary/secondary
  local_address: "0.0.0.0"    # 本地绑定地址
  local_port: 7947            # 本地同步端口
  region: "default"           # 区域

  # 对端中心列表
  peer_centers:
    # - id: "center-bj-02"
    #   name: "北京中心-备"
    #   role: "secondary"
    #   address: "192.168.1.200"
    #   port: 7947
    #   region: "beijing"
    #   tls_enabled: false

  # 同步配置
  sync_mode: "async"          # 同步模式: sync(同步)/async(异步)/semi_sync(半同步)
  batch_size: 500             # 批量大小
  flush_interval: 5           # 刷新间隔（秒）
  compress_enabled: true      # 启用压缩
  max_retries: 3              # 最大重试次数
  retry_delay: 2              # 重试间隔（秒）
  queue_size: 10000           # 队列大小
  queue_overflow: "drop_oldest" # 队列溢出策略: drop_latest/drop_oldest/block

# ============================================================
# 故障切换配置
# 单中心故障时，另一中心自动检测并无缝接管
# ============================================================
failover:
  enabled: false              # 启用故障切换（默认关闭）
  mode: "auto"                # 切换模式: auto(自动)/manual(手动)/semi_auto(半自动)

  # 故障检测
  heartbeat_interval: 3       # 心跳间隔（秒）
  heartbeat_timeout: 2        # 心跳超时（秒）
  failure_threshold: 3        # 连续失败次数触发切换
  success_threshold: 5        # 连续成功次数确认恢复

  # 切换配置
  switch_timeout: 30          # 切换超时（秒）
  pre_switch_delay: 2         # 切换前延迟（秒）
  graceful_shutdown: true     # 优雅关闭
  drain_timeout: 60           # 连接排空超时（秒）

  # 恢复配置
  auto_recover: true          # 自动恢复
  recover_delay: 30           # 恢复延迟（秒）
  data_repair_on_recover: true # 恢复时执行数据补偿

  # 防脑裂
  fence_enabled: true         # 启用围栏令牌
  fence_timeout: 10           # 围栏超时（秒）
  quorum_required: true       # 需要仲裁

# ============================================================
# 虚拟IP配置（可选）
# 用于故障切换时的流量重定向
# ============================================================
vip:
  enabled: false              # 启用虚拟IP（默认关闭）
  virtual_ip: ""              # 虚拟IP地址
  interface: ""               # 网络接口
  netmask: ""                 # 子网掩码

# ============================================================
# 熔断与降级配置
# 后端组件故障不影响整体服务，自动切换
# ============================================================
resilience:
  enabled: true               # 启用弹性管理（默认开启）
  health_check_interval: 10   # 健康检查间隔（秒）
  switch_timeout_sec: 30      # 切换超时（秒）
  graceful_degradation: true  # 优雅降级

  # 熔断器配置
  circuit_breaker:
    enabled: true             # 启用熔断器
    max_failures: 5           # 最大连续失败次数触发熔断
    reset_timeout_sec: 30     # 熔断恢复超时（秒）
    half_open_max: 3          # 半开状态最大探测数
    window_time_sec: 60       # 滑动窗口时间（秒）
    window_buckets: 10        # 滑动窗口桶数
    adaptive_enabled: true    # 自适应恢复超时（指数退避）
    timeout_sec: 10           # 单次执行超时（秒）

  # 降级策略
  policies:
    # eBPF采集器 → 传统采集器
    - component_id: "collector_ebpf"
      max_error_rate: 0.5
      max_errors: 10
      error_window_sec: 60
      fallback_to: "collector_traditional"
      auto_recover: true
      recover_after_sec: 120
      recover_threshold: 5

    # gRPC Edge连接 → 本地缓冲
    - component_id: "grpc_edge"
      max_error_rate: 0.5
      max_errors: 5
      error_window_sec: 30
      fallback_to: "local_buffer"
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 指标采集器（仅告警，无降级）
    - component_id: "collector_metrics"
      max_error_rate: 0.8
      max_errors: 20
      error_window_sec: 60
      fallback_to: ""
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 进程采集器（仅告警，无降级）
    - component_id: "collector_process"
      max_error_rate: 0.8
      max_errors: 20
      error_window_sec: 60
      fallback_to: ""
      auto_recover: true
      recover_after_sec: 60
      recover_threshold: 3

    # 双中心同步 → 本地模式
    - component_id: "dual_center_sync"
      max_error_rate: 0.5
      max_errors: 5
      error_window_sec: 60
      fallback_to: "local_only"
      auto_recover: true
      recover_after_sec: 120
      recover_threshold: 5

# ============================================================
# VXLAN 隧道解封装配置
# 支持 VXLAN 隧道解封装，提取内层原始流量
# ============================================================
vxlan:
  enabled: false              # 启用 VXLAN 解封装（默认关闭）
  listen_port: 4789           # VXLAN 监听端口 (RFC 7348)
  filter_vni: []              # 过滤的 VNI 列表（空=全部）
  filter_src_ip: []           # 过滤的内层源 IP
  filter_dst_ip: []           # 过滤的内层目的 IP
  buffer_size: 65535          # 缓冲区大小
  max_packet_size: 9000       # 最大包大小（支持 Jumbo Frame）

# ============================================================
# 流量镜像配置
# 将解封装后的流量镜像至云下环境
# ============================================================
mirror:
  enabled: false              # 启用流量镜像（默认关闭）
  source_ip: ""               # 源 IP（用于封装，留空自动获取）
  source_port: 4789           # 源端口
  queue_size: 10000           # 队列大小
  batch_size: 100             # 批量发送大小
  batch_timeout: 100          # 批量发送超时（毫秒）

  # 流量过滤（可选）
  filter:
    src_ips: []               # 过滤源 IP
    dst_ips: []               # 过滤目的 IP
    src_ports: []             # 过滤源端口
    dst_ports: []             # 过滤目的端口
    protocols: []             # 过滤协议 (6=TCP, 17=UDP)
    vnis: []                  # 过滤 VNI
    sample_rate: 100          # 采样率 (1-100)

  # 镜像目标列表
  targets:
    # 示例1：通过 VXLAN 隧道镜像到云下
    # - name: "cloud-onprem-vxlan"
    #   mode: "vxlan"
    #   address: "192.168.100.10"
    #   port: 4789
    #   vni: 100
    #   enabled: true

    # 示例2：通过 GRE 隧道镜像
    # - name: "cloud-onprem-gre"
    #   mode: "gre"
    #   address: "192.168.100.20"
    #   port: 47
    #   gre_key: 1000
    #   enabled: true

    # 示例3：通过 UDP 封装镜像
    # - name: "cloud-onprem-udp"
    #   mode: "udp"
    #   address: "192.168.100.30"
    #   port: 5000
    #   enabled: true

    # 示例4：通过 ERSPAN 镜像
    # - name: "cloud-onprem-erspan"
    #   mode: "erspan"
    #   address: "192.168.100.40"
    #   port: 47
    #   erspan_id: 1
    #   enabled: true

# ============================================================
# 协议解析插件配置
# 支持 Oracle、PostgreSQL、Redis、Kafka、Dubbo 协议深度解析
# ============================================================
protocol:
  enabled: true               # 启用协议解析（默认开启）
  buffer_size: 10000          # 解析缓冲区大小

  plugins:
    # Oracle TNS 协议解析
    - name: "oracle"
      enabled: true
      ports: [1521, 1522, 1526, 1575]

    # PostgreSQL 协议解析
    - name: "postgresql"
      enabled: true
      ports: [5432, 5433, 5434]

    # Redis RESP 协议解析
    - name: "redis"
      enabled: true
      ports: [6379, 6380, 6381]

    # Kafka 协议解析
    - name: "kafka"
      enabled: true
      ports: [9092, 9093, 9094]

    # Apache Dubbo 协议解析
    - name: "dubbo"
      enabled: true
      ports: [20880, 20881, 20882]

# ============================================================
# 丢包监控配置
# 监控网络接口丢包情况，支持接口统计和TCP探测两种方式
# ============================================================
packet_loss:
  enabled: true               # 启用丢包监控（默认开启）
  check_interval: 30          # 检查间隔（秒）
  interface: ""               # 监控的接口，空表示所有接口
  threshold_percent: 1.0      # 丢包率告警阈值（%）
  threshold_packets: 100      # 丢包数告警阈值
  alert_cooldown: 300         # 告警冷却时间（秒）
  enable_tcp_check: true      # 启用TCP探测检测
  tcp_check_target: "8.8.8.8" # TCP探测目标地址
  tcp_check_port: 53          # TCP探测目标端口

# ============================================================
# 时钟同步配置
# NTP时间同步与自动校准
# ============================================================
time_sync:
  enabled: true               # 启用时钟同步（默认开启）
  sync_interval: 3600         # 同步间隔（秒）
  servers:                    # NTP服务器列表
    - "pool.ntp.org"
    - "time.windows.com"
    - "time.apple.com"
    - "cn.pool.ntp.org"
  timeout: 10                 # 超时时间（秒）
  max_drift_sec: 300          # 最大允许时钟偏差（秒）
  auto_correct: false         # 自动校准系统时间（默认关闭，仅监控）
  drift_threshold: 1          # 偏差告警阈值（秒）
  retry_attempts: 3           # 重试次数

# ============================================================
# CPU等待瓶颈分析器配置
# 支持C/C++/Golang/Java程序的无侵入、动态采样分析
# ============================================================
profiler:
  enabled: true               # 启用CPU等待分析器（默认开启）
  sample_rate: 99             # 采样率 (Hz)，99Hz避免与定时器对齐
  max_samples_per_sec: 1000   # 每秒最大采样数
  target_languages:           # 目标语言
    - "c"
    - "cpp"
    - "go"
    - "java"
  target_pids: []             # 目标进程ID，空表示所有进程
  min_block_time_ms: 1        # 最小阻塞时间（毫秒）
  max_stack_depth: 128        # 最大栈深度
  symbol_resolution: true     # 启用符号解析
  report_interval: 60         # 报告间隔（秒）
  dynamic_adjust: true        # 动态调整采样率

  # 等待类型开关
  wait_types:
    futex: true               # futex等待（用户态锁）
    io: true                  # IO等待
    network: true             # 网络等待
    lock: true                # 锁等待
    sleep: true               # 睡眠等待
    park: true                # park等待（Go/Java）
    monitor: true             # Java monitor

# ============================================================
# Java内存分析器配置
# 支持ByteBuffer和JNI内存统计、泄漏检测、调用栈定位
# ============================================================
jvm_memory:
  enabled: true               # 启用Java内存分析（默认开启）
  sample_rate: 100            # 采样率 (0-100%)
  target_pids: []             # 目标JVM进程ID，空表示自动检测
  track_bytebuffer: true      # 追踪ByteBuffer.allocateDirect/free
  track_jni_memory: true      # 追踪JNI内存分配
  track_direct_memory: true   # 追踪DirectMemory/Unsafe.allocateMemory
  leak_check_interval: 300    # 泄漏检查间隔（秒）
  leak_threshold: 10.0        # 泄漏阈值（增长率%/小时）
  min_leak_size: 1048576      # 最小泄漏大小（字节，默认1MB）
  max_stack_depth: 64         # 最大栈深度
  symbol_resolution: true     # 启用符号解析
  report_interval: 60         # 报告间隔（秒）

# ============================================================
# AI建模配置
# 基于时间序列分析预测正常区间，智能异常检测
# ============================================================
ai_model:
  enabled: true               # 启用AI建模（默认开启）
  model_type: "ensemble"      # 模型类型: statistical, ensemble, moving_average, exponential_smoothing
  train_interval: 3600        # 训练间隔（秒）
  prediction_window: 60       # 预测窗口大小（预测未来60个数据点）
  history_window: 1440        # 历史数据窗口大小（约24小时，每分钟一个点）
  confidence_level: 0.95      # 置信区间 (0-1)
  anomaly_threshold: 3.0      # 异常阈值（标准差倍数）
  min_data_points: 100        # 最小训练数据点数
  seasonality_period: 1440    # 季节性周期（日周期，分钟级）
  enable_auto_tuning: true    # 自动调参
  metrics:                    # 监控的指标列表
    - "cpu_usage"
    - "memory_usage"
    - "network_bytes_in"
    - "network_bytes_out"
    - "disk_io_read"
    - "disk_io_write"

# ============================================================
# 智能告警配置
# 异常事件聚合、冷却、通知
# ============================================================
alert:
  enabled: true               # 启用智能告警（默认开启）
  cooldown_period: 300        # 告警冷却期（秒）
  aggregation_window: 60      # 告警聚合窗口（秒）
  max_alerts_per_min: 100     # 每分钟最大告警数
  suppress_duplicates: true   # 抑制重复告警
  notification_channels:      # 通知渠道
    - "log"
    - "webhook"

# ============================================================
# 多节点根因分析配置
# 跨节点告警关联、因果链推导、自动修复建议
# ============================================================
rca:
  enabled: true               # 启用根因分析（默认开启）
  correlation_window: 300     # 告警关联时间窗口（秒）
  max_correlation_depth: 5    # 最大关联深度
  min_correlation_score: 0.5  # 最小关联分数（0-1）
  enable_topology_aware: true # 启用拓扑感知关联
  enable_metric_correlate: true # 启用指标关联
  max_incident_age: 3600      # 最大事件保留时间（秒）
  analysis_interval: 30       # 分析间隔（秒）
  max_root_causes: 3          # 最大根因数量

# ============================================================
# 分布式追踪配置
# TraceID跨服务/网络追踪，关联进程剖析
# ============================================================
tracing:
  enabled: true                   # 启用分布式追踪（默认开启）
  service_name: ""                # 服务名称，留空自动获取
  sample_rate: 0.1                # 采样率 (0-1)，默认10%
  propagation_format: "both"      # 传播格式: w3c, b3, both
  max_spans_per_trace: 1000       # 每个Trace最大Span数
  max_trace_duration: 300         # Trace最大持续时间（秒）
  buffer_size: 10000              # 缓冲区大小
  report_interval: 30             # 报告间隔（秒）
  enable_process_profile: true    # 启用进程剖析关联
  enable_network_trace: true      # 启用网络路径追踪
  
  # 全局标签
  tags:
    environment: "production"
    datacenter: "default"
  
  # Header传播配置
  header_propagation:
    inherit_incoming: true        # 继承传入的TraceID
    inject_outgoing: true         # 向 outgoing 请求注入TraceID
    custom_headers:               # 自定义传播Header
      - "x-request-id"
      - "x-correlation-id"

# ============================================================
# 资源池/VPC健康评分配置
# 基于利用率、网络质量、SLA达标率三维加权计算综合健康分
# ============================================================
health_score:
  enabled: true                   # 启用健康评分（默认开启）
  eval_interval: 60               # 评估间隔（秒）
  history_retention: 1440         # 历史保留数量（约24小时）
  alert_threshold: 60.0           # 告警阈值（健康分低于此值触发告警）
  degrade_threshold: 40.0         # 降级阈值（健康分低于此值标记为严重）
  enable_trend: true              # 启用趋势分析
  trend_window: 30                # 趋势分析窗口大小

  # 加权配置（权重之和必须为1.0）
  weights:
    utilization: 0.4              # 利用率权重
    network: 0.3                  # 网络质量权重
    sla: 0.3                      # SLA达标率权重

  # VPC网络评估配置
  vpc:
    probe_timeout: 5000           # 探测超时（毫秒）
    probe_count: 5                # 每次探测次数
    probe_interval_ms: 200        # 探测间隔（毫秒）
    default_targets:              # 默认探测目标
      - "8.8.8.8"
      - "114.114.114.114"
    custom_targets: []            # 自定义探测目标
    latency_warning_ms: 50.0      # 延迟告警阈值（ms）
    latency_critical_ms: 200.0    # 延迟严重阈值（ms）
    loss_warning_pct: 1.0         # 丢包告警阈值（%）
    loss_critical_pct: 5.0        # 丢包严重阈值（%）
    bandwidth_min_mbps: 100.0     # 最小带宽要求（Mbps）
    check_internal_routing: true  # 检查VPC内路由

  # 资源池列表
  pools:
    # - id: "pool-bj-01"
    #   name: "北京资源池-主"
    #   type: "pool"
    #   hosts:
    #     - "192.168.1.10"
    #     - "192.168.1.11"
    #   labels:
    #     region: "beijing"
    #     tier: "production"

    # - id: "vpc-sh-01"
    #   name: "上海VPC-主"
    #   type: "vpc"
    #   vpc_id: "vpc-sh-prod-01"
    #   subnet_cidrs:
    #     - "10.0.1.0/24"
    #     - "10.0.2.0/24"
    #   labels:
    #     region: "shanghai"
    #     tier: "production"

# ============================================================
# 全包存储与回放配置
# 支持指定时间窗口抓包存储、按时间检索、流量回放
# ============================================================
pcap_storage:
  enabled: true                   # 启用全包存储（默认开启）
  base_dir: "/var/lib/cloud-flow/pcap"  # 存储根目录
  block_duration: 5               # 每个块的时间跨度（分钟）
  max_block_size: 100             # 单个块最大大小 (MB)
  compress_enabled: true          # 启用压缩
  compress_level: 6               # 压缩级别 1-9
  index_enabled: true             # 启用索引
  max_retention: 168              # 最大保留时间（小时，默认7天）
  max_total_size: 100             # 最大总容量 (GB)
  write_buffer_size: 1000         # 写缓冲区大小
  flush_interval: 5               # 刷新间隔（秒）

  # 回放配置
  replay:
    enabled: true                 # 启用回放功能
    default_speed: 1.0            # 默认倍速
    min_speed: 0.1                # 最小倍速
    max_speed: 16.0               # 最大倍速
    buffer_size: 1000             # 回放缓冲区大小
    loop_enabled: false           # 循环回放
    filter_rewrite: false         # 重写过滤
    target_interface: ""          # 目标接口
    pause_on_error: false         # 错误时暂停
    max_concurrent: 5             # 最大并发回放数

# ============================================================
# 内核兼容性与架构支持配置
# 支持 x86/ARM/鲲鹏/海光，内核版本校验，低内核自动降级
# ============================================================
kernel:
  enabled: true                   # 启用内核检测（默认开启）
  min_kernel_version: "3.10.0"    # 最低内核版本要求
  check_on_startup: true          # 启动时检查
  auto_detect_arch: true          # 自动检测架构
  fallback_to_legacy: true        # 不支持eBPF时降级到传统采集
  supported_archs:                # 支持的架构列表
    - "x86_64"
    - "aarch64"
    - "kunpeng"
    - "hygon"

# ============================================================
# 业务安全隔离配置
# 部署/启停/卸载进程隔离，cgroup限制，零业务干扰
# ============================================================
isolation:
  enabled: true                   # 启用隔离（默认开启）
  cgroup_path: "/sys/fs/cgroup"   # cgroup挂载路径
  cpu_quota_percent: 10           # CPU限制百分比
  memory_limit_mb: 512            # 内存限制MB
  io_weight: 10                   # IO权重 (10-1000)
  nice_level: 19                  # nice值 (19=最低优先级)
  oom_priority: 1000              # OOM优先级 (1000=优先被杀)
  no_new_privileges: true         # 禁止提权
  zero_interference: true         # 零干扰模式

# ============================================================
# eBPF资源限制配置
# CPU/内存上限控制，自适应采样，流量感知
# ============================================================
ebpf_resource:
  enabled: true                   # 启用资源限制（默认开启）
  cpu_max_percent: 20.0           # CPU最大使用率 (%)
  memory_max_mb: 256              # 内存最大使用 (MB)
  sample_rate_base: 1000          # 基础采样率 (Hz)
  sample_rate_min: 100            # 最小采样率 (Hz)
  sample_rate_max: 10000          # 最大采样率 (Hz)
  adaptive_enabled: true          # 启用自适应采样
  traffic_threshold: 100000       # 流量阈值 (pps)
  check_interval_sec: 5           # 检查间隔（秒）

# ============================================================
# TCP核心网络指标配置
# TCP建连时延、零窗口、队列溢出检测
# ============================================================
tcp_metrics:
  enabled: true                   # 启用TCP指标采集（默认开启）
  collect_interval_sec: 5         # 采集间隔（秒）
  collect_latency: true           # 采集建连时延
  detect_zero_window: true        # 检测零窗口
  detect_queue_overflow: true     # 检测队列溢出
  max_history_size: 1440          # 最大历史记录数（约2小时）

# ============================================================
# 协议解析配置
# HTTP/DNS/MySQL 深度解析：路径/Cookie/事务ID/错误信息
# ============================================================
protocol:
  enabled: true
  
  http:
    enabled: true
    parse_cookies: true            # 解析Cookies
    parse_headers: true            # 解析Headers
    parse_body: false              # 不解析Body（避免性能开销）
    max_body_size: 1024            # 最大Body大小
    extract_path: true             # 提取路径分段
    extract_query: true            # 提取查询参数
    extract_trace: true            # 提取TraceID/SpanID
  
  dns:
    enabled: true
    collect_txid: true             # 采集DNS事务ID
    parse_answers: true            # 解析答案记录
    parse_edns: true               # 解析EDNS扩展
  
  mysql:
    enabled: true
    parse_sql: true               # 解析SQL语句
    parse_errors: true             # 解析错误信息
    parse_result: true             # 解析结果集
    max_sql_length: 4096          # 最大SQL长度

# ============================================================
# 管理网传输配置
# 指定管理网卡，避免占用业务带宽
# ============================================================
transport:
  enabled: true
  mode: "direct"                 # direct/relay/grpc
  protocol: "tcp"
  
  # 管理网卡配置
  management_network:
    enabled: true                 # 启用管理网
    interface_name: ""           # 网卡名，留空自动检测
    bind_address: ""             # 绑定地址
    source_ip: ""                # 指定源IP
    allowed_ips: []              # 允许的目标IP列表
    blocked_ips:                 # 禁止的目标IP列表
      - "127.0.0.0/8"
      - "10.0.0.0/8"           # 示例：禁止内网IP
    auto_detect: true            # 自动检测管理网卡
    detect_patterns:             # 自动检测模式
      - "mgmt"
      - "management"
      - "control"
  
  buffer_size: 65536             # 发送缓冲区大小
  max_connections: 10             # 最大连接数
  conn_timeout: 30                # 连接超时（秒）
  write_timeout: 10               # 写超时（秒）
  keepalive: 60                  # KeepAlive（秒）
  
  # 可靠性配置
  reliability:
    enabled: true
    enable_ack: true              # 启用确认
    enable_retry: true            # 启用重传
    enable_dedupe: true           # 启用去重
    retry_count: 3               # 重传次数
    retry_interval: 100            # 重传间隔（毫秒）
    ack_timeout: 5000             # 确认超时（毫秒）
    window_size: 256              # 滑动窗口大小
    dedupe_window_sec: 300        # 去重窗口（秒）
  
  # 负载均衡
  load_balancing:
    enabled: true
    strategy: "round_robin"      # round_robin/least_conn/hash
    health_check: true            # 健康检查
    health_check_interval: 10      # 检查间隔（秒）

# ============================================================
# 过载熔断保护配置
# 资源超限自动熔断、静默保护、自动恢复
# ============================================================
circuit_breaker:
  enabled: true                   # 启用熔断（默认开启）
  
  # 触发条件
  cpu_warning_threshold: 60.0    # CPU警告阈值 (%)
  cpu_critical_threshold: 80.0    # CPU熔断阈值 (%)
  memory_warning_threshold: 70.0 # 内存警告阈值 (%)
  memory_critical_threshold: 90.0 # 内存熔断阈值 (%)
  
  # 触发方式
  failure_threshold: 5             # 连续失败次数触发熔断
  success_threshold: 3             # 半开后连续成功次数恢复
  timeout_threshold: 10            # 超时次数触发熔断
  latency_p99_threshold: 1000.0    # P99延迟阈值 (ms)
  
  # 时间窗口
  window_duration: 60             # 统计窗口（秒）
  circuit_open_duration: 30        # 熔断持续时间（秒）
  probe_interval: 5               # 半开探测间隔（秒）
  
  # 保护策略
  drop_percent_when_open: 100     # 熔断时丢弃百分比 (0-100)
  silent_mode: true               # 静默模式（不返回错误）
  queue_limit: 1000               # 请求队列限制

# ============================================================
# 采集器自监控配置
# 心跳/状态/资源占用上报，中心端感知探针异常
# ============================================================
self_monitor:
  enabled: true                   # 启用自监控（默认开启）
  interval_sec: 30               # 上报间隔（秒）
  heartbeat_enabled: true          # 启用心跳
  status_enabled: true             # 启用状态上报
  resource_enabled: true           # 启用资源上报
  history_enabled: true            # 启用历史记录
  report_endpoint: ""             # 上报目标地址
  report_timeout: 10               # 上报超时（秒）
  
  # 告警阈值
  cpu_warning_threshold: 70.0      # CPU警告阈值 (%)
  memory_warning_threshold: 80.0   # 内存警告阈值 (%)
  disk_warning_threshold: 85.0     # 磁盘警告阈值 (%)

# ============================================================
# 可靠传输配置
# 重传/确认/去重机制，确保数据传输准确性
# ============================================================
reliable_transport:
  enabled: true                   # 启用可靠传输（默认开启）
  window_size: 256               # 滑动窗口大小
  retry_count: 3                 # 最大重传次数
  retry_interval: 100            # 重传间隔（毫秒）
  ack_timeout: 5000               # ACK超时（毫秒）
  dedupe_enabled: true            # 启用去重
  dedupe_size: 10000              # 去重缓存大小
  dedupe_window: 300             # 去重窗口（秒）

# ============================================================
# 动态配置管理
# 采样率、指标项运行时动态调整，无需重启Agent
# ============================================================
dyn_config:
  enabled: true                   # 启用动态配置（默认开启）
  watch_enabled: true             # 启用配置文件监听热加载
  watch_interval: 5               # 文件监听间隔（秒）

# ============================================================
# Web管理API配置
# 提供RESTful API用于运行时配置管理
# ============================================================
web_api:
  enabled: true                   # 启用Web管理API（默认开启）
  listen_addr: "0.0.0.0:9500"    # 监听地址
  auth_enabled: true              # 启用Token认证
  auth_token: ""                  # 认证Token（留空自动生成，启动时打印日志）
  rate_limit: 60                  # 每分钟最大请求数
  read_timeout: 10                # 读超时（秒）
  write_timeout: 10               # 写超时（秒）

# ============================================================
# 日志管理配置
# 日志分级、轮转、自动清理，防止磁盘占满
# ============================================================
log_mgr:
  level: "info"                   # 最低日志级别: debug/info/warn/error/fatal
  output_mode: "both"             # 输出模式: stdout/file/both
  log_dir: "/var/log/cloud-flow"  # 日志目录
  log_file: "agent.log"           # 日志文件名
  max_file_size: 100              # 单文件最大大小 (MB)
  max_total_size: 1024            # 总日志最大大小 (MB)
  max_retention_days: 30          # 最大保留天数
  max_file_count: 20              # 最大文件数
  enable_color: true              # 启用颜色输出
  enable_rotation: true           # 启用日志轮转
  rotation_check_sec: 30          # 轮转检查间隔（秒）
  enable_compression: true        # 启用旧日志压缩
  format: "json"                  # 日志格式: text/json

# ============================================================
# libbpf eBPF 加载器配置
# 使用 libbpf 框架重构，支持 CO-RE 提升兼容性
# ============================================================
libbpf:
  enabled: true                   # 启用 libbpf（默认开启）
  object_path: "/opt/cloud-flow/bpf/probe.o"  # BPF 对象文件路径
  btf_path: ""                    # BTF 文件路径（留空自动检测）
  use_core: true                  # 启用 CO-RE (Compile Once, Run Everywhere)
  pin_maps: false                 # 固定 maps 到 BPF 文件系统
  pin_path: "/sys/fs/bpf/cloud-flow"  # 固定路径

  # Map 大小覆盖
  map_sizes:
    conn_map: 100000              # 连接跟踪表大小
    events_rb: 262144             # Ring buffer 大小 (256KB)
    pid_filter_map: 10000         # PID 过滤器大小

# ============================================================
# 探针热更新配置
# 无需重启 Agent，运行时动态 attach/detach 探针
# ============================================================
hot_reload:
  enabled: true                   # 启用热更新（默认开启）
  auto_apply: true                # 自动应用配置变更
  check_interval: 30              # 变更检查间隔（秒）
  attach_timeout: 10              # attach 超时（秒）
  detach_timeout: 5               # detach 超时（秒）
  retry_count: 3                  # 失败重试次数
  retry_interval: 1               # 重试间隔（秒）
  allow_partial_failure: true     # 允许部分失败

  # 预定义探针列表
  probes:
    # TCP 连接探针
    - id: "tcp_connect"
      name: "TCP Connect"
      type: "fentry"
      program: "trace_tcp_connect"
      target: "tcp_connect"
      enabled: true
      priority: 100
      description: "跟踪 TCP 连接建立"

    - id: "tcp_close"
      name: "TCP Close"
      type: "fentry"
      program: "trace_tcp_close"
      target: "tcp_close"
      enabled: true
      priority: 100
      description: "跟踪 TCP 连接关闭"

    - id: "tcp_sendmsg"
      name: "TCP Send"
      type: "fentry"
      program: "trace_tcp_sendmsg"
      target: "tcp_sendmsg"
      enabled: true
      priority: 90
      description: "跟踪 TCP 数据发送"

    - id: "tcp_recvmsg"
      name: "TCP Recv"
      type: "fentry"
      program: "trace_tcp_recvmsg"
      target: "tcp_recvmsg"
      enabled: false
      priority: 90
      description: "跟踪 TCP 数据接收"

    # 进程探针
    - id: "process_exec"
      name: "Process Exec"
      type: "tracepoint"
      program: "trace_sched_process_exec"
      category: "sched"
      target: "sched_process_exec"
      enabled: true
      priority: 80
      description: "跟踪进程执行"

    - id: "process_exit"
      name: "Process Exit"
      type: "tracepoint"
      program: "trace_sched_process_exit"
      category: "sched"
      target: "sched_process_exit"
      enabled: true
      priority: 80
      description: "跟踪进程退出"

  # 预定义指标列表
  metrics:
    - id: "tcp_connections"
      name: "TCP Connections"
      description: "TCP 连接数统计"
      unit: "count"
      type: "counter"
      probes:
        - "tcp_connect"
        - "tcp_close"
      enabled: true

    - id: "tcp_bytes_sent"
      name: "TCP Bytes Sent"
      description: "TCP 发送字节数"
      unit: "bytes"
      type: "counter"
      probes:
        - "tcp_sendmsg"
      enabled: true

    - id: "process_events"
      name: "Process Events"
      description: "进程事件统计"
      unit: "count"
      type: "counter"
      probes:
        - "process_exec"
        - "process_exit"
      enabled: true

# ============================================================
# 连接池配置
# 支持大规模探针接入（5000+），防止 OOM 崩溃
# ============================================================
conn_pool:
  enabled: true                   # 启用连接池（默认开启）
  max_connections: 10000         # 最大连接数
  initial_cap: 100               # 初始连接数
  max_idle: 500                  # 最大空闲连接
  idle_timeout: 300              # 空闲超时（秒）
  max_lifetime: 3600             # 最大生命周期（秒）
  enable_rate_limit: true        # 启用限流
  rate_limit_per_conn: 1000      # 每连接每秒限制
  burst_size: 100                # 突发流量大小
  global_rate_limit: 1000000     # 全局每秒限制
  queue_size: 10000              # 等待队列大小
  queue_timeout: 5               # 队列等待超时（秒）
  max_memory_mb: 4096            # 最大内存限制(MB)
  memory_check_interval: 10      # 内存检查间隔（秒）
  health_check_interval: 30      # 健康检查间隔（秒）
  health_check_timeout: 5        # 健康检查超时（秒）
  enable_adaptive: true          # 启用自适应调整
  scale_up_threshold: 0.8        # 扩容阈值(连接使用率)
  scale_down_threshold: 0.3      # 缩容阈值
  scale_up_factor: 2             # 扩容因子
  scale_down_factor: 2           # 缩容因子

# ============================================================
# 数据聚合配置
# 多级聚合减少中心端存储压力
# ============================================================
aggregation:
  enabled: true                   # 启用聚合（默认开启）
  default_level: "minute"        # 默认聚合级别
  window_size: 60                # 聚合窗口大小（秒）
  buffer_size: 100000            # 缓冲区大小
  flush_interval: 30             # 刷新间隔（秒）
  max_dimensions: 10             # 最大维度数
  max_cardinality: 10000         # 最大基数
  enable_compression: true       # 启用压缩
  compression_level: 6           # 压缩级别 1-9

  # 多级聚合配置
  agg_levels:
    - level: "second"
      window_size: 1             # 1秒窗口
      retention_time: 300        # 保留5分钟
      agg_types:
        - "sum"
        - "avg"
        - "count"
        - "max"
        - "min"
      dimensions:
        - "host"
        - "service"
        - "metric"

    - level: "minute"
      window_size: 60            # 1分钟窗口
      retention_time: 86400      # 保留24小时
      agg_types:
        - "sum"
        - "avg"
        - "count"
        - "max"
        - "min"
        - "p99"
        - "p95"
      dimensions:
        - "host"
        - "service"
        - "metric"
        - "region"

    - level: "hour"
      window_size: 3600          # 1小时窗口
      retention_time: 604800     # 保留7天
      agg_types:
        - "sum"
        - "avg"
        - "count"
        - "max"
        - "min"
        - "p99"
      dimensions:
        - "service"
        - "region"
        - "metric"

  # 采样配置
  sampling_enabled: true         # 启用采样
  sampling_rate: 1.0             # 采样率 (0-1)
  adaptive_sampling: true        # 自适应采样
  memory_threshold_mb: 2048      # 内存阈值(MB)
  downgrade_ratio: 0.5           # 降级比例

# ============================================================
# 断网续传配置
# 网络波动时数据本地缓存，恢复后自动同步
# ============================================================
offline_cache:
  enabled: true                   # 启用断网续传（默认开启）
  cache_dir: "/var/lib/cloud-flow/cache"  # 缓存目录
  max_size_mb: 10240             # 最大缓存大小 (MB) = 10GB
  max_items: 1000000              # 最大缓存条目数
  max_age: 7                      # 最大保留天数
  segment_size: 1000             # 分段大小
  compression: true               # 启用压缩
  flush_interval: 30             # 刷新间隔（秒）
  max_retries: 10                # 最大重试次数
  retry_interval: 30             # 重试间隔（秒）
  batch_size: 1000               # 批量大小
  parallelism: 4                  # 并行度
  auto_sync: true                # 网络恢复后自动同步

# ============================================================
# 探针认证配置
# 确保只有授权探针才能接入，防止安全漏洞
# ============================================================
auth:
  enabled: true                   # 启用认证（默认开启）
  token_expiry: 24               # Token 有效期（小时）
  max_token_per_probe: 5         # 每个探针最大 Token 数
  rate_limit_per_min: 1000       # 每分钟请求限制
  require_tls: true              # 要求 TLS 加密
  allowed_cipher_suites:          # 允许的加密套件
    - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
    - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
    - "TLS_RSA_WITH_AES_256_GCM_SHA384"
  hmac_key: ""                   # HMAC 签名密钥（留空自动生成）
  jwt_secret: ""                 # JWT 密钥（留空自动生成）
  admin_api_key: ""              # 管理 API 密钥（留空自动生成）

# ============================================================
# 负载均衡配置
# 多节点边缘服务横向扩展能力
# ============================================================
load_balancer:
  enabled: true                   # 启用负载均衡（默认开启）
  algorithm: "weighted"          # 负载均衡算法: round_robin/weighted/least_conn/ip_hash
  health_check: true            # 启用健康检查
  check_interval: 10            # 健康检查间隔（秒）
  check_timeout: 5               # 健康检查超时（秒）
  check_path: "/health"         # 健康检查路径
  circuit_breaker: true         # 启用熔断
  cb_threshold: 5               # 熔断阈值（连续失败次数）
  cb_timeout: 30                # 熔断超时（秒）
  rate_limit_enabled: true      # 启用限流
  rate_limit_per_sec: 100000     # 每秒请求限制
  burst_size: 1000              # 突发大小
  max_conn_per_backend: 100     # 每个后端最大连接数
  conn_timeout: 10              # 连接超时（秒）
  enable_weighted: true          # 启用权重

# ============================================================
# gRPC 客户端配置
# 完整的 gRPC 通信能力
# ============================================================
grpc:
  enabled: true                   # 启用 gRPC（默认开启）
  server_address: "localhost:50051"  # 服务器地址
  dial_timeout: 10               # 连接超时（秒）
  keepalive_time: 30             # 保活间隔（秒）
  keepalive_timeout: 10          # 保活超时（秒）
  max_recv_msg_size: 64          # 最大接收消息大小 (MB)
  max_send_msg_size: 64          # 最大发送消息大小 (MB)
  enable_tls: false              # 启用 TLS
  tls_cert_file: ""              # TLS 证书文件路径
  tls_key_file: ""               # TLS 密钥文件路径
  tls_ca_file: ""                # TLS CA 文件路径
  insecure_skip_verify: false    # 跳过 TLS 验证（仅测试）
  auth_token: ""                 # 认证 Token
  auth_interceptor: true         # 启用认证拦截器
  max_retries: 3                 # 最大重试次数
  retry_backoff: 1               # 重试退避时间（秒）

# ============================================================
# 监控指标配置
# 边缘服务状态可观测
# ============================================================
metrics:
  enabled: true                   # 启用监控指标（默认开启）
  collection_interval: 10         # 指标收集间隔（秒）
  report_interval: 60             # 指标上报间隔（秒）
  max_metrics: 10000             # 最大指标数
  buffer_size: 1000              # 缓冲区大小
  report_endpoint: "http://localhost:9090/metrics"  # 上报端点
  enable_system_metrics: true     # 启用系统指标
  enable_runtime_metrics: true    # 启用运行时指标
  enable_network_metrics: true    # 启用网络指标

# ============================================================
# CPU 性能剖析配置
# ON-CPU/OFF-CPU 火焰图分析，进程瓶颈定位
# ============================================================
cpu_profiler:
  enabled: true                   # 启用CPU性能剖析（默认开启）
  on_cpu_enabled: true            # 启用ON-CPU剖析（CPU执行时间）
  off_cpu_enabled: true           # 启用OFF-CPU剖析（阻塞等待时间）
  sample_rate: 100                # 采样率 (Hz)
  duration: 30                    # 单次剖析时长（秒）
  interval: 300                   # 剖析间隔（秒，默认5分钟）
  output_dir: "/var/lib/cloud-flow/profiles"  # 输出目录
  max_profiles: 100               # 最大保留剖析文件数
  target_pids: []                 # 目标进程ID，空表示所有进程
  target_processes: []            # 目标进程名列表
  min_block_time_ms: 1            # 最小阻塞时间（毫秒）
  max_stack_depth: 128            # 最大栈深度
  symbol_resolution: true         # 启用符号解析
  flame_graph_enabled: true       # 生成火焰图
  report_format: "flame"          # 报告格式: pprof/flame/svg

# ============================================================
# SQL 性能剖析配置
# SQL聚合、慢查询分析、性能瓶颈定位
# ============================================================
sql_profiler:
  enabled: true                   # 启用SQL性能剖析（默认开启）
  capture_queries: true           # 捕获SQL语句
  capture_slow_queries: true      # 捕获慢查询
  slow_query_threshold_ms: 100    # 慢查询阈值（毫秒）
  max_query_length: 4096          # 最大SQL长度
  aggregation_enabled: true       # 启用聚合
  aggregation_window: 60          # 聚合窗口（秒）
  fingerprint_enabled: true       # 启用SQL指纹（归一化）
  top_n_queries: 100              # TopN查询数
  output_dir: "/var/lib/cloud-flow/sql"  # 输出目录
  target_databases:               # 目标数据库类型
    - "mysql"
    - "postgresql"
    - "oracle"
    - "redis"
  target_ports:                   # 目标端口
    - 3306
    - 5432
    - 1521
    - 6379

# ============================================================
# 高可用集群配置
# Raft选举、数据分片、故障自动转移
# ============================================================
ha_cluster:
  enabled: false                  # 启用高可用集群（默认关闭）
  node_id: ""                     # 节点ID（留空自动生成）
  node_name: ""                   # 节点名称（留空使用主机名）
  bind_addr: "0.0.0.0"           # 绑定地址
  bind_port: 7948                # 集群通信端口

  # 集群节点列表
  peers: []
    # - id: "node-01"
    #   name: "节点-01"
    #   address: "192.168.1.101"
    #   port: 7948
    #   region: "beijing"
    #   priority: 100               # 选举优先级
    #   weight: 100                 # 负载权重
    # - id: "node-02"
    #   name: "节点-02"
    #   address: "192.168.1.102"
    #   port: 7948
    #   region: "beijing"
    #   priority: 90
    #   weight: 100
    # - id: "node-03"
    #   name: "节点-03"
    #   address: "192.168.1.103"
    #   port: 7948
    #   region: "beijing"
    #   priority: 80
    #   weight: 100

  election_timeout: 500           # 选举超时（毫秒）
  heartbeat_interval: 100         # 心跳间隔（毫秒）
  heartbeat_timeout: 300          # 心跳超时（毫秒）
  data_dir: "/var/lib/cloud-flow/ha"  # 数据目录
  replication_factor: 3           # 复制因子
  shard_count: 128                # 分片数
  auto_failover: true             # 自动故障转移
  auto_recover: true              # 自动恢复
  split_brain_check: true         # 脑裂检测
  quorum_required: true           # 需要仲裁

# ============================================================
# 数据留存策略配置
# 60天数据保留、自动清理、归档管理
# ============================================================
retention:
  enabled: true                   # 启用数据留存管理（默认开启）
  max_age_days: 60                # 最大保留天数（默认60天）
  max_size_gb: 100                # 最大磁盘使用量 (GB)
  min_free_space_gb: 10           # 最小剩余空间 (GB)
  cleanup_interval: 60            # 清理检查间隔（分钟）
  archive_enabled: true           # 是否归档
  archive_path: "/var/lib/cloud-flow/archive"  # 归档路径
  archive_retention_days: 180     # 归档保留天数（默认180天）
  emergency_cleanup: true         # 紧急清理（磁盘空间不足时）

  # 分类配置
  categories:
    # 指标数据
    - category: "metrics"
      max_age_days: 60
      max_size_gb: 20
      archive_enabled: true
      compress: true

    # 日志数据
    - category: "logs"
      max_age_days: 30
      max_size_gb: 10
      archive_enabled: true
      compress: true

    # 链路数据
    - category: "traces"
      max_age_days: 60
      max_size_gb: 30
      archive_enabled: true
      compress: true

    # 性能剖析数据
    - category: "profiles"
      max_age_days: 7
      max_size_gb: 5
      archive_enabled: true
      compress: true

    # 抓包数据
    - category: "pcap"
      max_age_days: 3
      max_size_gb: 50
      archive_enabled: true
      compress: false              # PCAP已压缩

    # 数据库观测数据
    - category: "database"
      max_age_days: 60
      max_size_gb: 15
      archive_enabled: true
      compress: true

    # 事件数据
    - category: "events"
      max_age_days: 90
      max_size_gb: 5
      archive_enabled: true
      compress: true

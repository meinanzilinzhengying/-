# =============================================================================
# Alertmanager 配置 - CloudFlow 微服务架构
# =============================================================================
global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-smtp.example.com:587}'
  smtp_from: '${SMTP_FROM:-alertmanager@cloudflow.local}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'
  smtp_require_tls: true

# 告警路由树
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 30s        # 同组告警等待时间
  group_interval: 5m       # 同组告警间隔
  repeat_interval: 4h     # 重复告警间隔
  routes:
    # 严重告警 - 立即发送
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    # 警告告警 - 聚合发送
    - match:
        severity: warning
      receiver: 'warning'
      group_wait: 30s
      repeat_interval: 4h

    # 信息告警 - 低优先级
    - match:
        severity: info
      receiver: 'info'
      group_wait: 5m
      repeat_interval: 12h

# 告警接收器
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://alert-engine:8009/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical'
    webhook_configs:
      - url: 'http://alert-engine:8009/api/v1/alerts/webhook'
        send_resolved: true
    # 邮件通知（取消注释并配置 SMTP 环境变量后启用）
    # email_configs:
    #   - to: '${ALERT_EMAIL_TO:-admin@example.com}'
    #     send_resolved: true
    #     headers:
    #       Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'

  - name: 'warning'
    webhook_configs:
      - url: 'http://alert-engine:8009/api/v1/alerts/webhook'
        send_resolved: true
    # email_configs:
    #   - to: '${ALERT_EMAIL_TO:-admin@example.com}'
    #     send_resolved: true
    #     headers:
    #       Subject: '[WARNING] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'

  - name: 'info'
    webhook_configs:
      - url: 'http://alert-engine:8009/api/v1/alerts/webhook'
        send_resolved: true

# 告警抑制规则
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

  - source_match:
      alertname: 'ServiceDown'
    target_match:
      alertname: 'DiskSpaceLow'
    equal: ['instance']

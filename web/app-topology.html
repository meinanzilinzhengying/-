<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Flow - 应用拓扑</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0a0e1a;
            color: #e0e6ed;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部工具栏 */
        .toolbar {
            height: 60px;
            background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
            border-bottom: 1px solid #2d3748;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 100;
        }

        .toolbar h1 {
            font-size: 18px;
            font-weight: 600;
            color: #63b3ed;
            margin-right: auto;
        }

        .toolbar-section {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 15px;
            border-right: 1px solid #2d3748;
        }

        .toolbar-section:last-child {
            border-right: none;
        }

        .toolbar-btn {
            padding: 8px 16px;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: #e0e6ed;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            background: #4a5568;
            border-color: #63b3ed;
        }

        .toolbar-btn.active {
            background: #3182ce;
            border-color: #63b3ed;
        }

        .toolbar-btn svg {
            width: 16px;
            height: 16px;
        }

        .layout-selector {
            display: flex;
            gap: 5px;
            background: #1a202c;
            padding: 4px;
            border-radius: 6px;
        }

        .layout-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: #9ca3af;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .layout-btn:hover {
            color: #e0e6ed;
        }

        .layout-btn.active {
            background: #3182ce;
            color: white;
        }

        /* 搜索框 */
        .search-box {
            position: relative;
            width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e0e6ed;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #63b3ed;
        }

        .search-box svg {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: #718096;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* 左侧筛选面板 */
        .filter-panel {
            width: 260px;
            background: #111827;
            border-right: 1px solid #2d3748;
            padding: 20px;
            overflow-y: auto;
        }

        .filter-section {
            margin-bottom: 25px;
        }

        .filter-title {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-title .count {
            background: #2d3748;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            color: #a0aec0;
        }

        .filter-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .filter-option:hover {
            background: #1f2937;
        }

        .filter-option input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #3182ce;
        }

        .filter-option .label {
            flex: 1;
            color: #cbd5e0;
        }

        .filter-option .badge {
            background: #2d3748;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            color: #718096;
        }

        /* 快照面板 */
        .snapshot-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2d3748;
        }

        .snapshot-btn {
            width: 100%;
            padding: 10px;
            background: #3182ce;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .snapshot-btn:hover {
            background: #2c5aa0;
        }

        .snapshot-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .snapshot-item {
            padding: 10px;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .snapshot-item:hover {
            border-color: #63b3ed;
        }

        .snapshot-item.selected {
            border-color: #3182ce;
            background: rgba(49, 130, 206, 0.1);
        }

        .snapshot-name {
            font-size: 13px;
            color: #e0e6ed;
            margin-bottom: 4px;
        }

        .snapshot-time {
            font-size: 11px;
            color: #718096;
        }

        /* 拓扑画布 */
        .topology-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle at center, #0d1117 0%, #0a0e1a 100%);
        }

        #topology-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #topology-svg:active {
            cursor: grabbing;
        }

        /* 节点样式 */
        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.2);
        }

        .node-rect {
            rx: 8;
            ry: 8;
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        /* 服务类型颜色 */
        .node-service .node-rect { fill: rgba(99, 179, 237, 0.15); stroke: #63b3ed; }
        .node-api .node-rect { fill: rgba(159, 122, 234, 0.15); stroke: #9f7aea; }
        .node-database .node-rect { fill: rgba(236, 112, 99, 0.15); stroke: #ec7063; }
        .node-cache .node-rect { fill: rgba(46, 204, 113, 0.15); stroke: #2ecc71; }
        .node-mq .node-rect { fill: rgba(241, 196, 15, 0.15); stroke: #f1c40f; }
        .node-gateway .node-rect { fill: rgba(155, 89, 182, 0.15); stroke: #9b59b6; }
        .node-external .node-rect { fill: rgba(149, 165, 166, 0.15); stroke: #95a5a6; }

        .node:hover .node-rect {
            filter: drop-shadow(0 0 8px currentColor);
        }

        .node-text {
            font-size: 12px;
            fill: #e0e6ed;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
            font-weight: 500;
        }

        .node-subtext {
            font-size: 10px;
            fill: #a0aec0;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        .node-icon {
            font-size: 20px;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        .node-metrics {
            font-size: 9px;
            fill: #718096;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        /* 状态指示 */
        .status-indicator {
            r: 5;
        }

        .status-healthy { fill: #2ecc71; }
        .status-warning { fill: #f1c40f; }
        .status-error { fill: #e74c3c; }

        /* 链路样式 */
        .link {
            fill: none;
            stroke-width: 2;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .link:hover {
            stroke-width: 4;
            filter: drop-shadow(0 0 4px currentColor);
        }

        .link-normal { stroke: #48bb78; }
        .link-warning { stroke: #ed8936; }
        .link-error { stroke: #e53e3e; }

        /* 协议标记 */
        .protocol-badge {
            font-size: 9px;
            fill: #e0e6ed;
            text-anchor: middle;
            dominant-baseline: middle;
            pointer-events: none;
        }

        .protocol-bg {
            fill: #2d3748;
            rx: 3;
            ry: 3;
        }

        /* 流量动画 */
        .traffic-dot {
            fill: #63b3ed;
            r: 3;
            filter: drop-shadow(0 0 4px #63b3ed);
        }

        /* 选中状态 */
        .node.selected .node-rect {
            stroke-width: 3;
            filter: drop-shadow(0 0 12px currentColor);
        }

        .link.selected {
            stroke-width: 4;
            filter: drop-shadow(0 0 6px currentColor);
        }

        /* 右侧面板 */
        .detail-panel {
            width: 400px;
            background: #111827;
            border-left: 1px solid #2d3748;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .detail-panel.hidden {
            transform: translateX(100%);
        }

        .detail-header {
            padding: 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 600;
            color: #e0e6ed;
        }

        .detail-close {
            background: none;
            border: none;
            color: #718096;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .detail-close:hover {
            background: #2d3748;
            color: #e0e6ed;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section-title {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        /* 指标网格 */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
            color: #63b3ed;
            margin-bottom: 4px;
        }

        .metric-value.warning { color: #ed8936; }
        .metric-value.error { color: #e53e3e; }

        .metric-label {
            font-size: 11px;
            color: #718096;
            text-transform: uppercase;
        }

        .metric-change {
            font-size: 11px;
            margin-top: 4px;
        }

        .metric-change.up { color: #48bb78; }
        .metric-change.down { color: #e53e3e; }

        /* 标签组 */
        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            padding: 4px 10px;
            background: #2d3748;
            border-radius: 4px;
            font-size: 11px;
            color: #a0aec0;
        }

        .tag.primary {
            background: rgba(49, 130, 206, 0.2);
            color: #63b3ed;
        }

        /* 详情行 */
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1f2937;
            font-size: 13px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #9ca3af;
        }

        .detail-value {
            color: #e0e6ed;
            font-weight: 500;
        }

        /* 缩放控制 */
        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 8px;
            z-index: 50;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            background: #2d3748;
            border: 1px solid #4a5568;
            border-radius: 6px;
            color: #e0e6ed;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .zoom-btn:hover {
            background: #4a5568;
            border-color: #63b3ed;
        }

        /* 图例 */
        .legend-panel {
            position: absolute;
            bottom: 20px;
            left: 280px;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 15px;
            z-index: 50;
        }

        .legend-title {
            font-size: 11px;
            color: #718096;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .legend-items {
            display: flex;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #a0aec0;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2d3748;
            border-top-color: #63b3ed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 15px;
            color: #9ca3af;
            font-size: 14px;
        }

        /* 提示框 */
        .tooltip {
            position: absolute;
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            color: #e0e6ed;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 150;
            max-width: 350px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d3748;
        }

        .tooltip-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .tooltip-title {
            font-weight: 600;
            color: #e0e6ed;
        }

        .tooltip-subtitle {
            font-size: 11px;
            color: #718096;
        }

        .tooltip-row {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 6px;
        }

        .tooltip-label {
            color: #9ca3af;
        }

        .tooltip-value {
            color: #e0e6ed;
            font-weight: 500;
        }

        /* 对比模式 */
        .compare-mode .node.added .node-rect {
            stroke: #2ecc71;
            stroke-dasharray: 5, 5;
        }

        .compare-mode .node.removed .node-rect {
            stroke: #e74c3c;
            opacity: 0.5;
        }

        .compare-mode .node.modified .node-rect {
            stroke: #f1c40f;
            stroke-width: 3;
        }

        .compare-mode .link.added {
            stroke: #2ecc71;
            stroke-dasharray: 5, 5;
        }

        .compare-mode .link.removed {
            stroke: #e74c3c;
            opacity: 0.3;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.visible {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: #1a202c;
            border: 1px solid #2d3748;
            border-radius: 12px;
            width: 500px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #2d3748;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: #718096;
            cursor: pointer;
            font-size: 24px;
        }

        .modal-content {
            padding: 20px;
            overflow-y: auto;
            max-height: 60vh;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #2d3748;
            border-radius: 6px;
            color: #e0e6ed;
            font-size: 14px;
        }

        .form-input:focus {
            outline: none;
            border-color: #63b3ed;
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #2d3748;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: #2d3748;
            border: 1px solid #4a5568;
            color: #e0e6ed;
        }

        .btn-secondary:hover {
            background: #4a5568;
        }

        .btn-primary {
            background: #3182ce;
            border: 1px solid #3182ce;
            color: white;
        }

        .btn-primary:hover {
            background: #2c5aa0;
        }

        /* 响应式 */
        @media (max-width: 1400px) {
            .filter-panel { width: 220px; }
            .detail-panel { width: 350px; }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <h1>🔀 应用拓扑</h1>
            
            <div class="toolbar-section">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索服务...">
                </div>
            </div>

            <div class="toolbar-section">
                <span style="font-size: 12px; color: #718096;">布局:</span>
                <div class="layout-selector">
                    <button class="layout-btn active" data-layout="force">自动</button>
                    <button class="layout-btn" data-layout="horizontal">横向</button>
                    <button class="layout-btn" data-layout="vertical">纵向</button>
                    <button class="layout-btn" data-layout="hierarchical">层次</button>
                </div>
            </div>

            <div class="toolbar-section">
                <button class="toolbar-btn" id="discoverBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                        <path d="M3 3v5h5"></path>
                        <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path>
                        <path d="M16 21h5v-5"></path>
                    </svg>
                    刷新
                </button>
                <button class="toolbar-btn" id="snapshotBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                        <circle cx="12" cy="13" r="4"></circle>
                    </svg>
                    保存快照
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧筛选面板 -->
            <div class="filter-panel">
                <div class="filter-section">
                    <div class="filter-title">
                        业务分组
                        <span class="count" id="groupCount">0</span>
                    </div>
                    <div class="filter-options" id="groupFilters">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-title">
                        协议类型
                        <span class="count" id="protocolCount">0</span>
                    </div>
                    <div class="filter-options" id="protocolFilters">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-title">
                        服务状态
                        <span class="count">3</span>
                    </div>
                    <div class="filter-options">
                        <label class="filter-option">
                            <input type="checkbox" value="healthy" checked data-filter="status">
                            <span class="label">🟢 健康</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="warning" checked data-filter="status">
                            <span class="label">🟡 警告</span>
                        </label>
                        <label class="filter-option">
                            <input type="checkbox" value="error" checked data-filter="status">
                            <span class="label">🔴 异常</span>
                        </label>
                    </div>
                </div>

                <!-- 快照管理 -->
                <div class="snapshot-section">
                    <div class="filter-title">拓扑快照</div>
                    <button class="snapshot-btn" id="createSnapshotBtn">📷 创建新快照</button>
                    <div class="snapshot-list" id="snapshotList">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 拓扑画布 -->
            <div class="topology-container" id="topologyContainer">
                <svg id="topology-svg"></svg>
                
                <!-- 缩放控制 -->
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoomIn">+</button>
                    <button class="zoom-btn" id="zoomReset">⌖</button>
                    <button class="zoom-btn" id="zoomOut">−</button>
                </div>

                <!-- 图例 -->
                <div class="legend-panel">
                    <div class="legend-title">服务类型</div>
                    <div class="legend-items">
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #63b3ed;"></div>
                            <span>服务</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ec7063;"></div>
                            <span>数据库</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #2ecc71;"></div>
                            <span>缓存</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #f1c40f;"></div>
                            <span>消息队列</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #9b59b6;"></div>
                            <span>网关</span>
                        </div>
                    </div>
                </div>

                <!-- 加载动画 -->
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">正在加载应用拓扑...</div>
                </div>
            </div>

            <!-- 右侧面板 -->
            <div class="detail-panel hidden" id="detailPanel">
                <div class="detail-header">
                    <span class="detail-title" id="detailTitle">服务详情</span>
                    <button class="detail-close" id="detailClose">×</button>
                </div>
                <div class="detail-content" id="detailContent">
                    <!-- 动态内容 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 提示框 -->
    <div class="tooltip" id="tooltip"></div>

    <!-- 保存快照模态框 -->
    <div class="modal-overlay" id="snapshotModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">保存拓扑快照</span>
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-content">
                <div class="form-group">
                    <label class="form-label">快照名称</label>
                    <input type="text" class="form-input" id="snapshotName" placeholder="输入快照名称...">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <textarea class="form-input form-textarea" id="snapshotDesc" placeholder="输入描述（可选）..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelSnapshot">取消</button>
                <button class="btn btn-primary" id="saveSnapshot">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            apiBaseUrl: '/api/v1/app-topology',
            refreshInterval: 30000,
            nodeWidth: 160,
            nodeHeight: 70,
            colors: {
                service: '#63b3ed',
                api: '#9f7aea',
                database: '#ec7063',
                cache: '#2ecc71',
                mq: '#f1c40f',
                gateway: '#9b59b6',
                external: '#95a5a6'
            }
        };

        // ==================== 状态管理 ====================
        const state = {
            nodes: [],
            links: [],
            simulation: null,
            svg: null,
            g: null,
            zoom: null,
            selectedNode: null,
            selectedLink: null,
            layout: 'force',
            filters: {
                businessGroups: [],
                protocols: [],
                status: ['healthy', 'warning', 'error']
            },
            snapshots: [],
            compareMode: false
        };

        // ==================== 初始化 ====================
        function init() {
            initSVG();
            initZoom();
            initEventListeners();
            loadFilters();
            loadTopology();
            loadSnapshots();
            
            // 定时刷新
            setInterval(() => loadTopology(), CONFIG.refreshInterval);
        }

        function initSVG() {
            const container = document.getElementById('topologyContainer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            state.svg = d3.select('#topology-svg')
                .attr('width', width)
                .attr('height', height)
                .attr('viewBox', [0, 0, width, height]);

            // 添加箭头标记
            const defs = state.svg.append('defs');
            
            ['normal', 'warning', 'error'].forEach(type => {
                defs.append('marker')
                    .attr('id', `arrow-${type}`)
                    .attr('viewBox', '0 -5 10 10')
                    .attr('refX', 25)
                    .attr('refY', 0)
                    .attr('markerWidth', 6)
                    .attr('markerHeight', 6)
                    .attr('orient', 'auto')
                    .append('path')
                    .attr('d', 'M0,-5L10,0L0,5')
                    .attr('fill', type === 'normal' ? '#48bb78' : type === 'warning' ? '#ed8936' : '#e53e3e');
            });

            // 主容器
            state.g = state.svg.append('g');
        }

        function initZoom() {
            state.zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    state.g.attr('transform', event.transform);
                });

            state.svg.call(state.zoom);
        }

        function initEventListeners() {
            // 搜索
            document.getElementById('searchInput').addEventListener('input', handleSearch);

            // 布局切换
            document.querySelectorAll('.layout-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.layout-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.layout = btn.dataset.layout;
                    applyLayout();
                });
            });

            // 刷新
            document.getElementById('discoverBtn').addEventListener('click', () => {
                fetch(`${CONFIG.apiBaseUrl}/discover`, { method: 'POST' });
                loadTopology();
            });

            // 快照按钮
            document.getElementById('snapshotBtn').addEventListener('click', () => {
                document.getElementById('snapshotModal').classList.add('visible');
            });

            document.getElementById('createSnapshotBtn').addEventListener('click', () => {
                document.getElementById('snapshotModal').classList.add('visible');
            });

            // 模态框
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('cancelSnapshot').addEventListener('click', closeModal);
            document.getElementById('saveSnapshot').addEventListener('click', saveSnapshot);

            // 缩放控制
            document.getElementById('zoomIn').addEventListener('click', () => zoomBy(1.2));
            document.getElementById('zoomOut').addEventListener('click', () => zoomBy(0.8));
            document.getElementById('zoomReset').addEventListener('click', resetZoom);

            // 关闭详情面板
            document.getElementById('detailClose').addEventListener('click', closeDetailPanel);

            // 窗口大小变化
            window.addEventListener('resize', handleResize);
        }

        // ==================== 数据加载 ====================
        async function loadFilters() {
            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/filters`);
                const data = await response.json();
                
                renderGroupFilters(data.business_groups);
                renderProtocolFilters(data.protocols);
            } catch (error) {
                console.error('加载过滤器失败:', error);
            }
        }

        async function loadTopology() {
            showLoading(true);
            
            try {
                const params = new URLSearchParams();
                params.append('layout', state.layout);
                params.append('timeRange', '15m');
                
                state.filters.businessGroups.forEach(g => params.append('businessGroup', g));
                state.filters.protocols.forEach(p => params.append('protocol', p));
                state.filters.status.forEach(s => params.append('status', s));
                
                const response = await fetch(`${CONFIG.apiBaseUrl}?${params}`);
                const data = await response.json();
                
                state.nodes = data.entities || [];
                state.links = data.links || [];
                
                renderTopology();
            } catch (error) {
                console.error('加载拓扑失败:', error);
                // 使用模拟数据
                generateMockData();
                renderTopology();
            } finally {
                showLoading(false);
            }
        }

        async function loadSnapshots() {
            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/snapshots`);
                state.snapshots = await response.json();
                renderSnapshotList();
            } catch (error) {
                console.error('加载快照失败:', error);
            }
        }

        // ==================== 渲染 ====================
        function renderGroupFilters(groups) {
            const container = document.getElementById('groupFilters');
            document.getElementById('groupCount').textContent = groups.length;
            
            container.innerHTML = groups.map(group => `
                <label class="filter-option">
                    <input type="checkbox" value="${group}" data-filter="group">
                    <span class="label">${group}</span>
                </label>
            `).join('');
            
            // 绑定事件
            container.querySelectorAll('input').forEach(cb => {
                cb.addEventListener('change', updateFilters);
            });
        }

        function renderProtocolFilters(protocols) {
            const container = document.getElementById('protocolFilters');
            document.getElementById('protocolCount').textContent = protocols.length;
            
            const protocolNames = {
                'http': 'HTTP',
                'https': 'HTTPS',
                'grpc': 'gRPC',
                'dubbo': 'Dubbo',
                'mysql': 'MySQL',
                'redis': 'Redis',
                'kafka': 'Kafka'
            };
            
            container.innerHTML = protocols.map(protocol => `
                <label class="filter-option">
                    <input type="checkbox" value="${protocol}" data-filter="protocol">
                    <span class="label">${protocolNames[protocol] || protocol.toUpperCase()}</span>
                </label>
            `).join('');
            
            container.querySelectorAll('input').forEach(cb => {
                cb.addEventListener('change', updateFilters);
            });
        }

        function renderSnapshotList() {
            const container = document.getElementById('snapshotList');
            
            if (state.snapshots.length === 0) {
                container.innerHTML = '<div style="color: #718096; font-size: 12px; text-align: center;">暂无快照</div>';
                return;
            }
            
            container.innerHTML = state.snapshots.map(snap => `
                <div class="snapshot-item" data-id="${snap.id}">
                    <div class="snapshot-name">${snap.name}</div>
                    <div class="snapshot-time">${formatTime(snap.created_at)}</div>
                </div>
            `).join('');
            
            // 绑定点击事件
            container.querySelectorAll('.snapshot-item').forEach(item => {
                item.addEventListener('click', () => loadSnapshot(item.dataset.id));
            });
        }

        function renderTopology() {
            // 清除现有内容
            state.g.selectAll('*').remove();

            if (state.nodes.length === 0) return;

            // 绘制链路
            renderLinks();

            // 绘制节点
            renderNodes();

            // 应用布局
            applyLayout();
        }

        function renderLinks() {
            const linkGroup = state.g.append('g').attr('class', 'links');

            // 链路路径
            const link = linkGroup.selectAll('.link')
                .data(state.links)
                .enter()
                .append('path')
                .attr('class', d => `link link-${d.status}`)
                .attr('id', d => d.id)
                .attr('marker-end', d => `url(#arrow-${d.status})`)
                .on('click', (event, d) => selectLink(d))
                .on('mouseover', (event, d) => showLinkTooltip(event, d))
                .on('mouseout', hideTooltip);

            // 协议标签
            const protocolLabel = linkGroup.selectAll('.protocol-group')
                .data(state.links.filter(l => l.protocol))
                .enter()
                .append('g')
                .attr('class', 'protocol-group');

            protocolLabel.append('rect')
                .attr('class', 'protocol-bg')
                .attr('width', 40)
                .attr('height', 16)
                .attr('rx', 3);

            protocolLabel.append('text')
                .attr('class', 'protocol-badge')
                .attr('dy', '0.35em')
                .text(d => d.protocol.toUpperCase());

            state.linkElements = link;
            state.protocolElements = protocolLabel;
        }

        function renderNodes() {
            const nodeGroup = state.g.append('g').attr('class', 'nodes');

            const node = nodeGroup.selectAll('.node')
                .data(state.nodes)
                .enter()
                .append('g')
                .attr('class', d => `node node-${d.type}`)
                .attr('id', d => d.id)
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('click', (event, d) => selectNode(d))
                .on('mouseover', (event, d) => showNodeTooltip(event, d))
                .on('mouseout', hideTooltip);

            // 节点矩形
            node.append('rect')
                .attr('class', 'node-rect')
                .attr('width', CONFIG.nodeWidth)
                .attr('height', CONFIG.nodeHeight)
                .attr('x', -CONFIG.nodeWidth / 2)
                .attr('y', -CONFIG.nodeHeight / 2);

            // 状态指示器
            node.append('circle')
                .attr('class', d => `status-indicator status-${d.status}`)
                .attr('cx', CONFIG.nodeWidth / 2 - 12)
                .attr('cy', -CONFIG.nodeHeight / 2 + 12);

            // 节点图标
            node.append('text')
                .attr('class', 'node-icon')
                .attr('x', -CONFIG.nodeWidth / 2 + 25)
                .attr('y', 0)
                .text(d => getNodeIcon(d.type));

            // 节点名称
            node.append('text')
                .attr('class', 'node-text')
                .attr('x', 15)
                .attr('y', -5)
                .text(d => truncateText(d.name, 10));

            // 节点类型
            node.append('text')
                .attr('class', 'node-subtext')
                .attr('x', 15)
                .attr('y', 12)
                .text(d => d.language || d.type);

            // QPS指标
            node.append('text')
                .attr('class', 'node-metrics')
                .attr('x', 0)
                .attr('y', CONFIG.nodeHeight / 2 + 15)
                .text(d => `QPS: ${formatNumber(d.app_metrics?.qps || 0)}`);

            state.nodeElements = node;
        }

        function applyLayout() {
            const width = document.getElementById('topologyContainer').clientWidth;
            const height = document.getElementById('topologyContainer').clientHeight;

            switch (state.layout) {
                case 'horizontal':
                    applyHorizontalLayout();
                    break;
                case 'vertical':
                    applyVerticalLayout();
                    break;
                case 'hierarchical':
                    applyHierarchicalLayout();
                    break;
                default:
                    applyForceLayout(width, height);
            }
        }

        function applyForceLayout(width, height) {
            // 停止之前的模拟
            if (state.simulation) {
                state.simulation.stop();
            }

            state.simulation = d3.forceSimulation(state.nodes)
                .force('link', d3.forceLink(state.links).id(d => d.id).distance(150))
                .force('charge', d3.forceManyBody().strength(-500))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(100));

            state.simulation.on('tick', () => {
                updatePositions();
            });
        }

        function applyHorizontalLayout() {
            // 按业务分组布局
            const groups = {};
            state.nodes.forEach(node => {
                if (!groups[node.business_group]) groups[node.business_group] = [];
                groups[node.business_group].push(node);
            });

            const groupNames = Object.keys(groups).sort();
            const groupWidth = 250;
            const nodeHeight = 100;

            groupNames.forEach((group, i) => {
                const x = i * groupWidth + 150;
                groups[group].forEach((node, j) => {
                    node.x = x;
                    node.y = j * nodeHeight + 100;
                    node.fx = x;
                    node.fy = j * nodeHeight + 100;
                });
            });

            updatePositions();
        }

        function applyVerticalLayout() {
            // 按类型分层
            const layers = {};
            state.nodes.forEach(node => {
                if (!layers[node.type]) layers[node.type] = [];
                layers[node.type].push(node);
            });

            const typeOrder = ['gateway', 'service', 'api', 'mq', 'cache', 'database', 'external'];
            const layerHeight = 120;
            const nodeWidth = 200;

            typeOrder.forEach((type, i) => {
                const nodes = layers[type] || [];
                const y = i * layerHeight + 100;

                nodes.forEach((node, j) => {
                    node.x = j * nodeWidth + 150;
                    node.y = y;
                    node.fx = j * nodeWidth + 150;
                    node.fy = y;
                });
            });

            updatePositions();
        }

        function applyHierarchicalLayout() {
            // 简化的层次布局
            const levels = calculateHierarchyLevels();
            const levelHeight = 120;
            const nodeWidth = 180;

            Object.keys(levels).forEach(level => {
                const nodes = levels[level];
                const y = parseInt(level) * levelHeight + 100;

                nodes.forEach((node, i) => {
                    node.x = i * nodeWidth + 150;
                    node.y = y;
                    node.fx = i * nodeWidth + 150;
                    node.fy = y;
                });
            });

            updatePositions();
        }

        function calculateHierarchyLevels() {
            const levels = {};
            
            // 初始化
            state.nodes.forEach(node => {
                levels[node.id] = 0;
            });

            // 迭代计算
            let changed = true;
            while (changed) {
                changed = false;
                state.links.forEach(link => {
                    const sourceLevel = levels[link.source_id];
                    const targetLevel = levels[link.target_id];
                    
                    if (targetLevel <= sourceLevel) {
                        levels[link.target_id] = sourceLevel + 1;
                        changed = true;
                    }
                });
            }

            // 按层级分组
            const levelGroups = {};
            Object.keys(levels).forEach(id => {
                const level = levels[id];
                if (!levelGroups[level]) levelGroups[level] = [];
                const node = state.nodes.find(n => n.id === id);
                if (node) levelGroups[level].push(node);
            });

            return levelGroups;
        }

        function updatePositions() {
            if (state.linkElements) {
                state.linkElements.attr('d', d => {
                    const dx = d.target.x - d.source.x;
                    const dy = d.target.y - d.source.y;
                    const dr = Math.sqrt(dx * dx + dy * dy) * 2;
                    return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
                });
            }

            if (state.protocolElements) {
                state.protocolElements.attr('transform', d => {
                    const x = (d.source.x + d.target.x) / 2 - 20;
                    const y = (d.source.y + d.target.y) / 2 - 8;
                    return `translate(${x}, ${y})`;
                });
            }

            if (state.nodeElements) {
                state.nodeElements.attr('transform', d => `translate(${d.x},${d.y})`);
            }
        }

        // ==================== 交互功能 ====================
        function dragstarted(event, d) {
            if (state.simulation && !event.active) state.simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (state.simulation && !event.active) state.simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        function selectNode(node) {
            state.nodeElements.classed('selected', false);
            state.linkElements.classed('selected', false);
            state.nodeElements.filter(d => d.id === node.id).classed('selected', true);
            
            state.selectedNode = node;
            showNodeDetail(node);
        }

        function selectLink(link) {
            state.nodeElements.classed('selected', false);
            state.linkElements.classed('selected', false);
            state.linkElements.filter(d => d.id === link.id).classed('selected', true);
            
            state.selectedLink = link;
            showLinkDetail(link);
        }

        function showNodeDetail(node) {
            const panel = document.getElementById('detailPanel');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');

            title.textContent = node.name;
            
            const metrics = node.app_metrics || {};
            const netMetrics = node.net_metrics || {};
            
            content.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value ${getMetricClass(metrics.qps)}">${formatNumber(metrics.qps || 0)}</div>
                        <div class="metric-label">QPS</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value ${getMetricClass(metrics.latency, 100)}">${(metrics.latency || 0).toFixed(1)}ms</div>
                        <div class="metric-label">平均延迟</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value ${getMetricClass(metrics.error_rate, 0.01)}">${((metrics.error_rate || 0) * 100).toFixed(2)}%</div>
                        <div class="metric-label">错误率</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${(metrics.cpu_usage || 0).toFixed(1)}%</div>
                        <div class="metric-label">CPU</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">基本信息</div>
                    <div class="detail-row">
                        <span class="detail-label">类型</span>
                        <span class="detail-value">${node.type}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">语言</span>
                        <span class="detail-value">${node.language || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">业务分组</span>
                        <span class="detail-value">${node.business_group || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">团队</span>
                        <span class="detail-value">${node.team || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">命名空间</span>
                        <span class="detail-value">${node.namespace || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">状态</span>
                        <span class="detail-value" style="color: ${getStatusColor(node.status)}">${node.status}</span>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">网络指标</div>
                    <div class="detail-row">
                        <span class="detail-label">活跃连接</span>
                        <span class="detail-value">${formatNumber(netMetrics.conn_active || 0)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">重传率</span>
                        <span class="detail-value">${((netMetrics.retrans_rate || 0) * 100).toFixed(2)}%</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">RTT</span>
                        <span class="detail-value">${(netMetrics.rtt || 0).toFixed(2)}ms</span>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">标签</div>
                    <div class="tag-group">
                        ${Object.entries(node.labels || {}).map(([k, v]) => `
                            <span class="tag">${k}: ${v}</span>
                        `).join('')}
                    </div>
                </div>
            `;

            panel.classList.remove('hidden');
        }

        function showLinkDetail(link) {
            const panel = document.getElementById('detailPanel');
            const title = document.getElementById('detailTitle');
            const content = document.getElementById('detailContent');

            title.textContent = '调用链路详情';
            const metrics = link.metrics || {};
            
            content.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value">${formatNumber(metrics.request_count || 0)}</div>
                        <div class="metric-label">请求量</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${(metrics.latency || 0).toFixed(1)}ms</div>
                        <div class="metric-label">平均时延</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value ${getMetricClass(metrics.error_rate, 0.01)}">${((metrics.error_rate || 0) * 100).toFixed(2)}%</div>
                        <div class="metric-label">错误率</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${(metrics.bandwidth || 0).toFixed(0)}Mbps</div>
                        <div class="metric-label">带宽</div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-section-title">链路信息</div>
                    <div class="detail-row">
                        <span class="detail-label">源服务</span>
                        <span class="detail-value">${link.source?.name || link.source_id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">目标服务</span>
                        <span class="detail-value">${link.target?.name || link.target_id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">协议</span>
                        <span class="detail-value">${link.protocol?.toUpperCase() || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">方法</span>
                        <span class="detail-value">${link.method || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">路径</span>
                        <span class="detail-value">${link.path || 'N/A'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">状态</span>
                        <span class="detail-value" style="color: ${getStatusColor(link.status)}">${link.status}</span>
                    </div>
                </div>
            `;

            panel.classList.remove('hidden');
        }

        function closeDetailPanel() {
            document.getElementById('detailPanel').classList.add('hidden');
            state.nodeElements?.classed('selected', false);
            state.linkElements?.classed('selected', false);
        }

        // ==================== 工具函数 ====================
        function getNodeIcon(type) {
            const icons = {
                service: '⚙️',
                api: '🔌',
                database: '🗄️',
                cache: '⚡',
                mq: '📨',
                gateway: '🚪',
                external: '🔗'
            };
            return icons[type] || '❓';
        }

        function getStatusColor(status) {
            const colors = {
                healthy: '#2ecc71',
                warning: '#f1c40f',
                error: '#e74c3c',
                normal: '#48bb78'
            };
            return colors[status] || '#718096';
        }

        function getMetricClass(value, threshold) {
            if (threshold === undefined) return '';
            if (value > threshold * 2) return 'error';
            if (value > threshold) return 'warning';
            return '';
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }

        function formatTime(timeStr) {
            const date = new Date(timeStr);
            return date.toLocaleString('zh-CN');
        }

        // ==================== 筛选功能 ====================
        function updateFilters() {
            state.filters.businessGroups = Array.from(document.querySelectorAll('[data-filter="group"]:checked')).map(cb => cb.value);
            state.filters.protocols = Array.from(document.querySelectorAll('[data-filter="protocol"]:checked')).map(cb => cb.value);
            state.filters.status = Array.from(document.querySelectorAll('[data-filter="status"]:checked')).map(cb => cb.value);
            
            loadTopology();
        }

        function handleSearch(event) {
            const query = event.target.value.toLowerCase();
            
            if (!state.nodeElements) return;
            
            if (!query) {
                state.nodeElements.style('opacity', 1);
                state.linkElements?.style('opacity', 1);
                return;
            }

            state.nodeElements.style('opacity', d => {
                const match = d.name.toLowerCase().includes(query) ||
                             d.id.toLowerCase().includes(query) ||
                             (d.business_group && d.business_group.toLowerCase().includes(query));
                return match ? 1 : 0.2;
            });
        }

        // ==================== 快照功能 ====================
        function closeModal() {
            document.getElementById('snapshotModal').classList.remove('visible');
            document.getElementById('snapshotName').value = '';
            document.getElementById('snapshotDesc').value = '';
        }

        async function saveSnapshot() {
            const name = document.getElementById('snapshotName').value;
            const description = document.getElementById('snapshotDesc').value;
            
            if (!name) {
                alert('请输入快照名称');
                return;
            }

            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/snapshots`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description, tags: [] })
                });
                
                if (response.ok) {
                    closeModal();
                    loadSnapshots();
                }
            } catch (error) {
                console.error('保存快照失败:', error);
            }
        }

        async function loadSnapshot(id) {
            try {
                const response = await fetch(`${CONFIG.apiBaseUrl}/snapshots/${id}`);
                const snapshot = await response.json();
                
                if (snapshot.topology) {
                    state.nodes = snapshot.topology.entities || [];
                    state.links = snapshot.topology.links || [];
                    renderTopology();
                }
            } catch (error) {
                console.error('加载快照失败:', error);
            }
        }

        // ==================== 缩放功能 ====================
        function zoomBy(factor) {
            state.svg.transition().duration(300).call(state.zoom.scaleBy, factor);
        }

        function resetZoom() {
            state.svg.transition().duration(300).call(state.zoom.transform, d3.zoomIdentity);
        }

        // ==================== 响应式 ====================
        function handleResize() {
            const container = document.getElementById('topologyContainer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            state.svg.attr('width', width).attr('height', height).attr('viewBox', [0, 0, width, height]);

            if (state.simulation) {
                state.simulation.force('center', d3.forceCenter(width / 2, height / 2));
                state.simulation.alpha(0.3).restart();
            }
        }

        // ==================== 提示框 ====================
        function showNodeTooltip(event, node) {
            const tooltip = document.getElementById('tooltip');
            const metrics = node.app_metrics || {};
            
            tooltip.innerHTML = `
                <div class="tooltip-header">
                    <div class="tooltip-icon" style="background: ${CONFIG.colors[node.type] || '#718096'}20; color: ${CONFIG.colors[node.type] || '#718096'}">
                        ${getNodeIcon(node.type)}
                    </div>
                    <div>
                        <div class="tooltip-title">${node.name}</div>
                        <div class="tooltip-subtitle">${node.type} · ${node.language || 'Unknown'}</div>
                    </div>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">QPS</span>
                    <span class="tooltip-value">${formatNumber(metrics.qps || 0)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">延迟</span>
                    <span class="tooltip-value">${(metrics.latency || 0).toFixed(1)}ms</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">错误率</span>
                    <span class="tooltip-value">${((metrics.error_rate || 0) * 100).toFixed(2)}%</span>
                </div>
            `;

            positionTooltip(event);
            tooltip.classList.add('visible');
        }

        function showLinkTooltip(event, link) {
            const tooltip = document.getElementById('tooltip');
            const metrics = link.metrics || {};
            
            tooltip.innerHTML = `
                <div class="tooltip-header">
                    <div class="tooltip-icon" style="background: #48bb7820; color: #48bb78">→</div>
                    <div>
                        <div class="tooltip-title">${link.source?.name || link.source_id}</div>
                        <div class="tooltip-subtitle">→ ${link.target?.name || link.target_id}</div>
                    </div>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">协议</span>
                    <span class="tooltip-value">${link.protocol?.toUpperCase() || 'N/A'}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">请求量</span>
                    <span class="tooltip-value">${formatNumber(metrics.request_count || 0)}</span>
                </div>
                <div class="tooltip-row">
                    <span class="tooltip-label">时延</span>
                    <span class="tooltip-value">${(metrics.latency || 0).toFixed(1)}ms</span>
                </div>
            `;

            positionTooltip(event);
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        function positionTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            const rect = tooltip.getBoundingClientRect();
            let x = event.pageX + 15;
            let y = event.pageY + 15;

            if (x + rect.width > window.innerWidth) x = event.pageX - rect.width - 15;
            if (y + rect.height > window.innerHeight) y = event.pageY - rect.height - 15;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        // ==================== 模拟数据 ====================
        function generateMockData() {
            // 服务定义
            const services = [
                { id: 'svc-gateway', name: 'API网关', type: 'gateway', group: '基础设施', lang: 'Go', status: 'healthy' },
                { id: 'svc-order', name: '订单服务', type: 'service', group: '订单中心', lang: 'Java', status: 'healthy' },
                { id: 'svc-payment', name: '支付服务', type: 'service', group: '支付中心', lang: 'Java', status: 'warning' },
                { id: 'svc-user', name: '用户服务', type: 'service', group: '用户中心', lang: 'Go', status: 'healthy' },
                { id: 'svc-product', name: '商品服务', type: 'service', group: '商品中心', lang: 'Java', status: 'healthy' },
                { id: 'svc-cart', name: '购物车服务', type: 'service', group: '订单中心', lang: 'Go', status: 'healthy' },
                { id: 'svc-inventory', name: '库存服务', type: 'service', group: '商品中心', lang: 'Java', status: 'healthy' },
                { id: 'svc-message', name: '消息服务', type: 'mq', group: '订单中心', lang: 'Go', status: 'healthy' },
                { id: 'svc-redis', name: 'Redis缓存', type: 'cache', group: '基础设施', lang: 'C', status: 'healthy' },
                { id: 'svc-mysql-order', name: '订单数据库', type: 'database', group: '订单中心', lang: 'SQL', status: 'healthy' },
                { id: 'svc-mysql-user', name: '用户数据库', type: 'database', group: '用户中心', lang: 'SQL', status: 'healthy' },
                { id: 'svc-alipay', name: '支付宝', type: 'external', group: '支付中心', lang: 'Java', status: 'healthy' }
            ];

            state.nodes = services.map(s => ({
                ...s,
                business_group: s.group,
                language: s.lang,
                namespace: 'production',
                app_metrics: {
                    qps: Math.random() * 5000 + 100,
                    latency: Math.random() * 100 + 10,
                    error_rate: Math.random() * 0.05,
                    cpu_usage: Math.random() * 60 + 20,
                    memory_usage: Math.random() * 70 + 30
                },
                net_metrics: {
                    conn_active: Math.floor(Math.random() * 100),
                    retrans_rate: Math.random() * 0.01,
                    rtt: Math.random() * 5 + 1
                },
                labels: { version: 'v1.0.0' }
            }));

            // 调用链路
            const links = [
                { source: 'svc-gateway', target: 'svc-order', protocol: 'http', method: 'POST' },
                { source: 'svc-gateway', target: 'svc-user', protocol: 'http', method: 'GET' },
                { source: 'svc-gateway', target: 'svc-product', protocol: 'http', method: 'GET' },
                { source: 'svc-order', target: 'svc-payment', protocol: 'http', method: 'POST' },
                { source: 'svc-order', target: 'svc-inventory', protocol: 'http', method: 'POST' },
                { source: 'svc-order', target: 'svc-mysql-order', protocol: 'mysql' },
                { source: 'svc-order', target: 'svc-message', protocol: 'kafka' },
                { source: 'svc-payment', target: 'svc-alipay', protocol: 'https' },
                { source: 'svc-user', target: 'svc-redis', protocol: 'redis' },
                { source: 'svc-user', target: 'svc-mysql-user', protocol: 'mysql' },
                { source: 'svc-cart', target: 'svc-redis', protocol: 'redis' }
            ];

            state.links = links.map((l, i) => ({
                id: `link-${i}`,
                source_id: l.source,
                target_id: l.target,
                source: state.nodes.find(n => n.id === l.source),
                target: state.nodes.find(n => n.id === l.target),
                protocol: l.protocol,
                method: l.method,
                status: Math.random() > 0.8 ? 'error' : Math.random() > 0.6 ? 'warning' : 'normal',
                metrics: {
                    request_count: Math.floor(Math.random() * 100000),
                    latency: Math.random() * 50 + 5,
                    error_rate: Math.random() * 0.03,
                    bandwidth: Math.random() * 100
                }
            }));
        }

        // ==================== UI辅助 ====================
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // ==================== 启动 ====================
        document.addEventListener('DOMContentLoaded', init);
    </script>

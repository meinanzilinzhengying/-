# =============================================================================
# Prometheus 配置 - 云内流量监测系统
# =============================================================================
global:
  scrape_interval: 15s          # 默认采集间隔
  evaluation_interval: 15s      # 告警规则评估间隔
  scrape_timeout: 10s           # 采集超时
  external_labels:
    cluster: 'cloud-flow'
    env: 'production'

# 告警规则文件
rule_files:
  - 'rules/*.yml'

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# 采集配置
scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus 自身监控
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Agent 探针采集端
  # ---------------------------------------------------------------------------
  - job_name: 'agent'
    static_configs:
      - targets: ['agent:9090']
    scrape_interval: 10s
    relabel_configs:
      - target_label: service
        replacement: 'cloud-flow-agent'

  # ---------------------------------------------------------------------------
  # Edge 边缘节点
  # ---------------------------------------------------------------------------
  - job_name: 'edge'
    static_configs:
      - targets: ['edge:9092']
    scrape_interval: 10s
    relabel_configs:
      - target_label: service
        replacement: 'cloud-flow-edge'

  # ---------------------------------------------------------------------------
  # Center 中心服务
  # ---------------------------------------------------------------------------
  - job_name: 'center'
    static_configs:
      - targets: ['center:9191']
    scrape_interval: 15s
    metrics_path: /metrics
    relabel_configs:
      - target_label: service
        replacement: 'cloud-flow-center'

  # ---------------------------------------------------------------------------
  # Node Exporter (宿主机指标)
  # ---------------------------------------------------------------------------
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # cAdvisor (容器指标)
  # ---------------------------------------------------------------------------
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # Kafka Exporter (Kafka 指标 - P1: Flow Ingest Pipeline 监控)
  # ---------------------------------------------------------------------------
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
    scrape_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: 'kafka'

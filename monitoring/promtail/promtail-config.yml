# =============================================================================
# Promtail 配置 - 云内流量监测系统
# =============================================================================
# 文档: https://grafana.com/docs/loki/latest/send-data/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: cloud-flow
    batchwait: 1s
    batchsize: 1048576  # 1MB
    timeout: 10s

scrape_configs:
  # ---------------------------------------------------------------------------
  # Docker 容器日志
  # ---------------------------------------------------------------------------
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=cloud-flow"]
    relabel_configs:
      # 容器名称作为标签
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # 服务名称
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      # 镜像名称
      - source_labels: [__meta_docker_container_image]
        regex: '(.*/)?([^:]+)(:.*)?'
        target_label: image
        replacement: '$2'
      # 日志路径
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log

  # ---------------------------------------------------------------------------
  # Agent 应用日志
  # ---------------------------------------------------------------------------
  - job_name: agent-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: agent
          __path__: /var/log/cloud-flow/agent.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            timestamp: timestamp
            message: message
            caller: caller
      - labels:
          level:
          caller:
      - timestamp:
          source: timestamp
          format: RFC3339Nano

  # ---------------------------------------------------------------------------
  # Nginx 访问日志
  # ---------------------------------------------------------------------------
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[\d\.]+) - (?P<remote_user>\S+) \[(?P<time_local>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>\d+) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          remote_addr:
          status:
      - metrics:
          nginx_requests_total:
            type: Counter
            description: "Total nginx requests"
            source: status
            config:
              action: inc
          nginx_request_duration:
            type: Histogram
            description: "Request duration"
            source: body_bytes_sent
            config:
              buckets: [100, 500, 1000, 5000, 10000]

  # ---------------------------------------------------------------------------
  # Nginx 错误日志
  # ---------------------------------------------------------------------------
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          log_type: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '^(?P<time>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<pid>\d+)#(?P<tid>\d+): (?P<message>.*)'
      - labels:
          level:

  # ---------------------------------------------------------------------------
  # 系统日志
  # ---------------------------------------------------------------------------
  - job_name: syslog
    journal:
      json: false
      max_age: 12h
      path: /var/log/journal
      labels:
        job: systemd
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'


# ============================================================
# 资产下钻配置
# 支持单资产网络/应用指标采集与查询
# ============================================================
asset_drilldown:
  enabled: true                   # 启用资产下钻
  
  # 资产指标采集器配置
  collector:
    enabled: true                 # 启用采集
    interval_sec: 15              # 采集间隔（秒）
    network_enabled: true         # 采集网络指标
    app_enabled: true             # 采集应用指标
    system_enabled: true          # 采集系统指标
    proc_path: "/proc"            # /proc路径
    sys_path: "/sys"              # /sys路径
    enable_per_process: true      # 启用进程级采集
    enable_per_interface: true    # 启用接口级采集
    max_processes: 100            # 最大进程数
  
  # 指标聚合器配置
  aggregator:
    enabled: true                 # 启用聚合
    interval_sec: 60              # 聚合间隔（秒）
    default_granularity: "1m"     # 默认粒度: 1s/10s/1m/5m/1h/1d
    retention_days: 7             # 数据保留天数
    max_data_points: 10000        # 最大数据点数
    enable_pre_aggregation: true  # 启用预聚合
    pre_agg_granularities:        # 预聚合粒度列表
      - "1m"
      - "5m"
      - "1h"
  
  # 指标存储配置
  storage:
    enabled: true                 # 启用存储
    driver: "sqlite"              # 驱动: sqlite/mysql/postgres
    dsn: "/var/lib/cloud-flow/asset_metrics.db"  # 数据源
    max_connections: 10           # 最大连接数
    retention_days: 7             # 数据保留天数
    cleanup_interval: 60          # 清理间隔（分钟）
    enable_compression: true      # 启用压缩
    batch_size: 100               # 批量写入大小
    write_interval_sec: 10        # 写入间隔（秒）
  
  # 资产下钻API配置
  api:
    enabled: true                 # 启用API
    listen_addr: ":8082"          # 监听地址
    auth_enabled: false           # 启用认证
    auth_token: ""                # 认证Token
    rate_limit: 1000              # 限流（请求/分钟）
    read_timeout: 30              # 读超时（秒）
    write_timeout: 30             # 写超时（秒）

# ============================================================
# 数据检索配置
# 支持网络/应用/SQL多条件筛选和历史趋势图
# ============================================================
query:
  enabled: true                   # 启用数据检索
  
  # 筛选引擎配置
  filter:
    enabled: true                 # 启用筛选引擎
    driver: "sqlite"              # 驱动: sqlite/mysql/postgres
    dsn: "/var/lib/cloud-flow/query.db"  # 数据源
    max_connections: 10           # 最大连接数
    query_timeout_sec: 30         # 查询超时（秒）
    enable_cache: true            # 启用查询缓存
    cache_ttl_sec: 60             # 缓存TTL（秒）
  
  # 趋势生成器配置
  trend:
    enabled: true                 # 启用趋势生成
    default_granularity: "5m"     # 默认时间粒度: 1s/10s/1m/5m/1h/1d
    max_data_points: 1000         # 最大数据点数
    enable_compare: true          # 启用同比/环比
    smooth_window: 3              # 平滑窗口
    fill_gap: true                # 填充数据间隙
    supported_types:              # 支持的趋势类型
      - "line"
      - "area"
      - "bar"
      - "stacked"
      - "step"
  
  # 数据检索API配置
  api:
    enabled: true                 # 启用API
    listen_addr: ":8083"          # 监听地址
    auth_enabled: false           # 启用认证
    auth_token: ""                # 认证Token
    rate_limit: 1000              # 限流（请求/分钟）
    read_timeout: 30              # 读超时（秒）
    write_timeout: 30             # 写超时（秒）

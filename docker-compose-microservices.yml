# CloudFlow 微服务架构 - Docker Compose 配置
#
# 架构：纯微服务架构（废弃旧 Center）
# 版本：v2.0
# 日期：2026-05-28
#
# 启动：docker-compose up -d
# 查看日志：docker-compose logs -f [service]
# 停止：docker-compose down

version: '3.8'

services:
  # ============================================================================
  # 1. 认证服务 (Auth Service)
  # ============================================================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-auth
    ports:
      - "8006:8006"  # HTTP API
      - "9006:9006"  # gRPC
    environment:
      - SERVICE_NAME=auth-service
      - GRPC_ADDR=:9006
      - HTTP_ADDR=:8006
      - JWT_ISSUER=cloudflow
      - JWT_EXPIRE_SEC=86400
      - JWT_REFRESH_SEC=604800
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:-}  # Base64 encoded RSA private key
      - SUPER_ADMIN_ROLE=super_admin
      # TiDB 配置
      - TIDB_ADDR=tidb:4000
      - TIDB_USER=root
      - TIDB_PASSWORD=${CLOUD_FLOW_DB_PASSWORD:?请设置 CLOUD_FLOW_DB_PASSWORD}
      - TIDB_DATABASE=cloudflow_auth
      # OIDC 配置（可选）
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
    depends_on:
      - tidb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 2. 租户服务 (Tenant Service)
  # ============================================================================
  tenant-service:
    build:
      context: ./services/tenant-service
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-tenant
    ports:
      - "8010:8010"  # HTTP API
      - "9010:9010"  # gRPC
    environment:
      - SERVICE_NAME=tenant-service
      - GRPC_ADDR=:9010
      - HTTP_ADDR=:8010
      # TiDB 配置
      - TIDB_ADDR=tidb:4000
      - TIDB_USER=root
      - TIDB_PASSWORD=${CLOUD_FLOW_DB_PASSWORD:?请设置 CLOUD_FLOW_DB_PASSWORD}
      - TIDB_DATABASE=cloudflow_tenant
    depends_on:
      - tidb
      - auth-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 3. 控制面服务 (Control Plane)
  # ============================================================================
  control-plane:
    build:
      context: ./services/control-plane
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-control-plane
    ports:
      - "8001:8001"  # HTTP 管理 API
      - "9001:9001"  # gRPC
    environment:
      - SERVICE_NAME=control-plane
      - GRPC_ADDR=:9001
      - HTTP_ADDR=:8001
      # etcd 配置
      - ETCD_ENDPOINTS=etcd:2379
      - ETCD_PREFIX=/cloudflow/services/
      - AGENT_TTL=90s
      - HEARTBEAT_TIMEOUT=60s
      # 下游服务连接
      - DATA_PLANE_ADDR=data-plane:9001
      - AUTH_ADDR=auth-service:9006
      - TENANT_ADDR=tenant-service:9010
    depends_on:
      - etcd
      - data-plane
      - auth-service
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 4. 数据面服务 (Data Plane)
  # ============================================================================
  data-plane:
    build:
      context: ./services/data-plane
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-data-plane
    ports:
      - "8001:8001"  # HTTP API
      - "9001:9001"  # gRPC
      - "9101:9101"  # Metrics
    environment:
      - SERVICE_NAME=data-plane
      - GRPC_ADDR=:9001
      - HTTP_ADDR=:8001
      # 批量写入配置
      - BATCH_SIZE=10000
      - FLUSH_INTERVAL=1s
      - QUEUE_SIZE=100000
      - WORKER_COUNT=4
      # ClickHouse 配置
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=cloudflow
      # 其他存储（可选）
      - VICTORIA_METRICS_ADDR=http://victoriametrics:8428
      - LOKI_ADDR=http://loki:3100
      # 下游服务连接
      - CONTROL_PLANE_ADDR=control-plane:9001
      - TOPOLOGY_ADDR=topology-engine:8008
    depends_on:
      - clickhouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 5. 查询服务 (Query Service)
  # ============================================================================
  query-service:
    build:
      context: ./services/query-service
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-query
    ports:
      - "8007:8007"  # HTTP API
      - "9007:9007"  # gRPC
    environment:
      - SERVICE_NAME=query-service
      - GRPC_ADDR=:9007
      - HTTP_ADDR=:8007
      # ClickHouse 配置
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=cloudflow
      # 缓存配置
      - CACHE_ENABLED=true
      - CACHE_TTL=300s
      # 下游服务连接
      - AUTH_ADDR=auth-service:9006
      - TENANT_ADDR=tenant-service:9010
    depends_on:
      - clickhouse
      - auth-service
      - tenant-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 6. 拓扑引擎 (Topology Engine)
  # ============================================================================
  topology-engine:
    build:
      context: ./services/topology-engine
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-topology
    ports:
      - "8008:8008"  # HTTP API
      - "9008:9008"  # gRPC
    environment:
      - SERVICE_NAME=topology-engine
      - GRPC_ADDR=:9008
      - HTTP_ADDR=:8008
      # ClickHouse 配置
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=cloudflow
      # Redis 配置（用于缓存拓扑数据）
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 下游服务连接
      - AUTH_ADDR=auth-service:9006
      - DATA_PLANE_ADDR=data-plane:9001
    depends_on:
      - clickhouse
      - redis
      - auth-service
      - data-plane
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 7. 告警引擎 (Alert Engine)
  # ============================================================================
  alert-engine:
    build:
      context: ./services/alert-engine
      dockerfile: deployments/Dockerfile
    container_name: cloudflow-alert
    ports:
      - "8009:8009"  # HTTP API
      - "9009:9009"  # gRPC
    environment:
      - SERVICE_NAME=alert-engine
      - GRPC_ADDR=:9009
      - HTTP_ADDR=:8009
      # TiDB 配置（告警规则和记录）
      - TIDB_ADDR=tidb:4000
      - TIDB_USER=root
      - TIDB_PASSWORD=${CLOUD_FLOW_DB_PASSWORD:?请设置 CLOUD_FLOW_DB_PASSWORD}
      - TIDB_DATABASE=cloudflow_alert
      # Redis 配置（告警状态）
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # ClickHouse 配置（查询指标）
      - CLICKHOUSE_ADDR=clickhouse:9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      # 通知配置
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SLACK_WEBHOOK=${SLACK_WEBHOOK:-}
      - DINGTALK_WEBHOOK=${DINGTALK_WEBHOOK:-}
      # 下游服务连接
      - AUTH_ADDR=auth-service:9006
      - TENANT_ADDR=tenant-service:9010
      - DATA_PLANE_ADDR=data-plane:9001
    depends_on:
      - tidb
      - redis
      - clickhouse
      - auth-service
      - tenant-service
      - data-plane
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 数据存储层
  # ============================================================================

  # TiDB（结构化数据）
  tidb:
    image: pingcap/tidb:v7.5.0
    container_name: cloudflow-tidb
    ports:
      - "4000:4000"  # TiDB Server
      - "10080:10080"  # Status API
    command:
      - --store=mocktikv
      - --path=/tmp/tidb
      - --log-file=/tmp/tidb.log
    volumes:
      - tidb-data:/tmp/tidb
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-P", "4000", "-u", "root", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ClickHouse（时序数据）
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: cloudflow-clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"   # Native
    environment:
      - CLICKHOUSE_DB=cloudflow
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-ClickHouse2024Secure}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./services/data-plane/deployments/clickhouse-config.xml:/etc/clickhouse-server/config.d/custom-config.xml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # etcd（服务发现和配置）
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: cloudflow-etcd
    ports:
      - "2379:2379"  # Client
      - "2380:2380"  # Server
    command:
      - --name=etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-cluster-state=new
      - --initial-cluster-token=cloudflow-etcd-token
    volumes:
      - etcd-data:/etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Redis（缓存和消息）
  redis:
    image: redis:7.2-alpine
    container_name: cloudflow-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Kafka（消息队列）- 可选，高流量场景使用
  kafka:
    image: apache/kafka:3.6.0
    container_name: cloudflow-kafka
    ports:
      - "9092:9092"  # Internal
      - "9094:9094"  # External
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,EXTPLAINTEXT://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTPLAINTEXT://localhost:9094
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTPLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/var/lib/kafka/logs
    volumes:
      - kafka-data:/var/lib/kafka/logs
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # VictoriaMetrics（指标存储）- 可选
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.96.0
    container_name: cloudflow-victoriametrics
    ports:
      - "8428:8428"  # HTTP
      - "2003:2003"   # Graphite
    command:
      - --storageDataPath=/var/lib/victoriametrics
      - --retentionPeriod=30d
    volumes:
      - vm-data:/var/lib/victoriametrics
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Loki（日志存储）- 可选
  loki:
    image: grafana/loki:2.9.0
    container_name: cloudflow-loki
    ports:
      - "3100:3100"  # HTTP
    command:
      - -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # ============================================================================
  # 监控和可观测性
  # ============================================================================

  # Prometheus（指标收集）
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: cloudflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Grafana（可视化）
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cloudflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?请设置 GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

  # Jaeger（分布式追踪）
  jaeger:
    image: jaegertracing/all-in-one:1.52.0
    container_name: cloudflow-jaeger
    ports:
      - "16686:16686"  # UI
      - "14268:14268"  # Collector
      - "6831:6831/udp"  # Agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:14268/metrics"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - cloudflow-network

# ============================================================================
# 网络配置
# ============================================================================
networks:
  cloudflow-network:
    driver: bridge
    name: cloudflow-network

# ============================================================================
# 存储卷
# ============================================================================
volumes:
  tidb-data:
    name: cloudflow-tidb-data
  clickhouse-data:
    name: cloudflow-clickhouse-data
  etcd-data:
    name: cloudflow-etcd-data
  redis-data:
    name: cloudflow-redis-data
  kafka-data:
    name: cloudflow-kafka-data
  vm-data:
    name: cloudflow-victoriametrics-data
  loki-data:
    name: cloudflow-loki-data
  prometheus-data:
    name: cloudflow-prometheus-data
  grafana-data:
    name: cloudflow-grafana-data

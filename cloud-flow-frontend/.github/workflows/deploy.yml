      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       cd /opt/cloud-flow
      #       docker-compose pull
      #       docker-compose up -d
      #       docker image prune -f

      - name: Deployment placeholder
        run: |
          echo "⚠️ SSH deployment is commented out. Please configure SSH secrets and uncomment the deployment step."
          echo ""
          echo "Required secrets:"
          echo "- STAGING_HOST: Staging server hostname"
          echo "- STAGING_USER: SSH username"
          echo "- STAGING_SSH_KEY: SSH private key"


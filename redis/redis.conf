# Redis 配置文件
# L3 修复: 使用配置文件设置密码，避免密码暴露在命令行参数中

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 数据目录
dir /data

# 持久化配置
save 900 1
save 300 10
save 60 10000

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 数据库数量
databases 16

# 最大内存限制
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# 密码通过环境变量 REDIS_PASSWORD 设置
# 在 docker-compose.yml 中使用 envsubst 替换
requirepass ${REDIS_PASSWORD}

# 禁用危险命令（可选，生产环境建议启用）
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG "CONFIG_9f8d7e6a5b4c3d2e1f0"

syntax = "proto3";

package cloudflow;

option go_package = "github.com/meinanzilinzhengying/cloud-flow-agent/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

// ============================================================
// 错误码定义
// ============================================================

enum ErrorCode {
  // 成功
  OK = 0;
  
  // 通用错误 (1-99)
  UNKNOWN_ERROR = 1;
  INVALID_ARGUMENT = 2;
  DEADLINE_EXCEEDED = 3;
  NOT_FOUND = 4;
  ALREADY_EXISTS = 5;
  PERMISSION_DENIED = 6;
  RESOURCE_EXHAUSTED = 7;
  FAILED_PRECONDITION = 8;
  ABORTED = 9;
  OUT_OF_RANGE = 10;
  UNIMPLEMENTED = 11;
  INTERNAL_ERROR = 12;
  UNAVAILABLE = 13;
  DATA_LOSS = 14;
  UNAUTHENTICATED = 15;
  
  // 认证授权错误 (100-199)
  AUTH_TOKEN_INVALID = 100;
  AUTH_TOKEN_EXPIRED = 101;
  AUTH_SIGNATURE_INVALID = 102;
  AUTH_INSUFFICIENT_PERMISSIONS = 103;
  AUTH_ACCOUNT_LOCKED = 104;
  AUTH_ACCOUNT_DISABLED = 105;
  AUTH_MFA_REQUIRED = 106;
  AUTH_MFA_INVALID = 107;
  
  // Agent 错误 (200-299)
  AGENT_NOT_REGISTERED = 200;
  AGENT_ALREADY_REGISTERED = 201;
  AGENT_VERSION_INCOMPATIBLE = 202;
  AGENT_HEARTBEAT_TIMEOUT = 203;
  AGENT_CONFIG_INVALID = 204;
  AGENT_COMMAND_FAILED = 205;
  AGENT_RESOURCE_LIMIT = 206;
  AGENT_COLLECTOR_FAILED = 207;
  
  // 配置错误 (300-399)
  CONFIG_PARSE_ERROR = 300;
  CONFIG_VALIDATION_FAILED = 301;
  CONFIG_VERSION_MISMATCH = 302;
  CONFIG_SIGNATURE_INVALID = 303;
  CONFIG_NOT_FOUND = 304;
  
  // 数据传输错误 (400-499)
  DATA_ENCODE_ERROR = 400;
  DATA_DECODE_ERROR = 401;
  DATA_COMPRESSION_ERROR = 402;
  DATA_ENCRYPTION_ERROR = 403;
  DATA_BATCH_TOO_LARGE = 404;
  DATA_RATE_LIMITED = 405;
  DATA_INVALID_FORMAT = 406;
  
  // 存储错误 (500-599)
  STORAGE_WRITE_ERROR = 500;
  STORAGE_READ_ERROR = 501;
  STORAGE_CONNECTION_ERROR = 502;
  STORAGE_QUOTA_EXCEEDED = 503;
  
  // 网络错误 (600-699)
  NETWORK_CONNECTION_ERROR = 600;
  NETWORK_TIMEOUT = 601;
  NETWORK_DNS_ERROR = 602;
  NETWORK_TLS_ERROR = 603;
  NETWORK_CIRCUIT_BREAKER_OPEN = 604;
  
  // 拓扑错误 (700-799)
  TOPOLOGY_DISCOVERY_FAILED = 700;
  TOPOLOGY_ENTITY_NOT_FOUND = 701;
  TOPOLOGY_RELATION_INVALID = 702;
  
  // 告警错误 (800-899)
  ALERT_RULE_INVALID = 800;
  ALERT_NOTIFICATION_FAILED = 801;
  ALERT_SILENCED = 802;
}

// 错误详情消息
message ErrorDetails {
  ErrorCode code = 1;
  string message = 2;
  string details = 3;
  map<string, string> metadata = 4;
  google.protobuf.Timestamp timestamp = 5;
  string request_id = 6;
  string trace_id = 7;
}

// ============================================================
// 云流探针服务
// ============================================================

service CloudFlowAgent {
  // 探针注册与心跳
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc UnregisterAgent(UnregisterAgentRequest) returns (google.protobuf.Empty);
  
  // 数据采集上报
  rpc ReportMetrics(stream MetricBatch) returns (ReportResponse);
  rpc ReportTraces(stream TraceBatch) returns (ReportResponse);
  rpc ReportLogs(stream LogBatch) returns (ReportResponse);
  rpc ReportEvents(stream EventBatch) returns (ReportResponse);
  rpc ReportNetworkFlows(stream NetworkFlowBatch) returns (ReportResponse);
  rpc ReportProcessEvents(stream ProcessEventBatch) returns (ReportResponse);
  rpc ReportSystemMetrics(stream SystemMetricBatch) returns (ReportResponse);
  
  // 配置管理
  rpc GetConfig(GetConfigRequest) returns (ConfigResponse);
  rpc UpdateConfig(UpdateConfigRequest) returns (ConfigResponse);
  rpc SubscribeConfigChanges(SubscribeConfigRequest) returns (stream ConfigChangeEvent);
  
  // 命令执行
  rpc ExecuteCommand(CommandRequest) returns (CommandResponse);
  rpc StreamCommands(StreamCommandRequest) returns (stream CommandRequest);
  
  // 文件传输
  rpc UploadFile(stream FileChunk) returns (FileTransferResponse);
  rpc DownloadFile(DownloadFileRequest) returns (stream FileChunk);
  
  // 诊断与调试
  rpc GetDiagnostics(DiagnosticsRequest) returns (DiagnosticsResponse);
  rpc CaptureProfile(ProfileRequest) returns (stream ProfileData);
  
  // 探针状态查询
  rpc GetAgentStatus(AgentStatusRequest) returns (AgentStatusResponse);
  rpc GetAgentMetrics(AgentMetricsRequest) returns (AgentMetricsResponse);
  
  // 拓扑相关
  rpc ReportTopology(TopologyReportRequest) returns (ReportResponse);
  rpc GetTopology(GetTopologyRequest) returns (TopologyResponse);
  
  // 告警相关
  rpc ReportAlert(AlertReportRequest) returns (AlertReportResponse);
  rpc SubscribeAlerts(AlertSubscriptionRequest) returns (stream AlertReport);
}

// ============================================================
// 边缘服务服务
// ============================================================

service EdgeService {
  // 数据接收
  rpc ReceiveMetrics(stream MetricBatch) returns (AckResponse);
  rpc ReceiveTraces(stream TraceBatch) returns (AckResponse);
  rpc ReceiveLogs(stream LogBatch) returns (AckResponse);
  rpc ReceiveEvents(stream EventBatch) returns (AckResponse);
  rpc ReceiveNetworkFlows(stream NetworkFlowBatch) returns (AckResponse);
  
  // 负载均衡与路由
  rpc GetRoutingInfo(RoutingRequest) returns (RoutingResponse);
  rpc ReportLoad(LoadReport) returns (google.protobuf.Empty);
  
  // 服务发现
  rpc DiscoverServices(ServiceDiscoveryRequest) returns (ServiceDiscoveryResponse);
  rpc RegisterService(ServiceRegistration) returns (ServiceRegistrationResponse);
  rpc DeregisterService(DeregisterServiceRequest) returns (google.protobuf.Empty);
  
  // 健康检查
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetServiceHealth(ServiceHealthRequest) returns (ServiceHealthResponse);
  rpc StreamHealthChecks(stream HealthCheckRequest) returns (stream HealthCheckResponse);
}

// ============================================================
// 中心控制服务
// ============================================================

service ControlCenter {
  // 全局配置管理
  rpc GetGlobalConfig(GlobalConfigRequest) returns (GlobalConfigResponse);
  rpc UpdateGlobalConfig(UpdateGlobalConfigRequest) returns (GlobalConfigResponse);
  rpc PushConfig(PushConfigRequest) returns (PushConfigResponse);
  
  // 策略管理
  rpc GetPolicy(PolicyRequest) returns (PolicyResponse);
  rpc UpdatePolicy(UpdatePolicyRequest) returns (PolicyResponse);
  rpc ListPolicies(ListPoliciesRequest) returns (ListPoliciesResponse);
  rpc DeletePolicy(DeletePolicyRequest) returns (google.protobuf.Empty);
  
  // 告警管理
  rpc ReportAlert(AlertReport) returns (AlertResponse);
  rpc SubscribeAlerts(AlertSubscription) returns (stream AlertReport);
  rpc AcknowledgeAlert(AcknowledgeAlertRequest) returns (AlertResponse);
  rpc ResolveAlert(ResolveAlertRequest) returns (AlertResponse);
  
  // 数据分析
  rpc QueryMetrics(MetricsQueryRequest) returns (MetricsQueryResponse);
  rpc QueryTraces(TracesQueryRequest) returns (TracesQueryResponse);
  rpc QueryLogs(LogsQueryRequest) returns (LogsQueryResponse);
  rpc QueryEvents(EventsQueryRequest) returns (EventsQueryResponse);
  rpc QueryTopology(TopologyQueryRequest) returns (TopologyQueryResponse);
  
  // 探针管理
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc GetAgentDetails(AgentDetailsRequest) returns (AgentDetailsResponse);
  rpc ControlAgent(AgentControlRequest) returns (AgentControlResponse);
  rpc BatchControlAgents(BatchControlAgentsRequest) returns (BatchControlAgentsResponse);
  
  // 租户管理
  rpc CreateTenant(CreateTenantRequest) returns (TenantResponse);
  rpc UpdateTenant(UpdateTenantRequest) returns (TenantResponse);
  rpc DeleteTenant(DeleteTenantRequest) returns (google.protobuf.Empty);
  rpc GetTenant(GetTenantRequest) returns (TenantResponse);
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse);
  
  // 用户管理
  rpc CreateUser(CreateUserRequest) returns (UserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);
  
  // 采集器管理
  rpc DeployCollector(DeployCollectorRequest) returns (DeployCollectorResponse);
  rpc ControlCollector(ControlCollectorRequest) returns (ControlCollectorResponse);
  rpc GetCollectorStatus(GetCollectorStatusRequest) returns (CollectorStatusResponse);
  rpc ListCollectors(ListCollectorsRequest) returns (ListCollectorsResponse);
}

// ============================================================
// 基础消息定义
// ============================================================

// 分页请求
message PaginationRequest {
  int32 page_size = 1;
  string page_token = 2;
  string sort_by = 3;
  bool sort_desc = 4;
}

// 分页响应
message PaginationResponse {
  int32 total_count = 1;
  string next_page_token = 2;
  bool has_more = 3;
}

// 时间范围
message TimeRange {
  google.protobuf.Timestamp start_time = 1;
  google.protobuf.Timestamp end_time = 2;
}

// 标签过滤
message TagFilter {
  string key = 1;
  string value = 2;
  string operator = 3; // eq, ne, contains, regex
}

// ============================================================
// 探针信息
// ============================================================

message AgentInfo {
  string agent_id = 1;
  string hostname = 2;
  string ip_address = 3;
  string version = 4;
  string os_type = 5;
  string arch = 6;
  map<string, string> tags = 7;
  AgentCapabilities capabilities = 8;
  google.protobuf.Timestamp register_time = 9;
  google.protobuf.Timestamp last_heartbeat = 10;
  string status = 11; // online, offline, error, upgrading
  string tenant_id = 12;
  string region = 13;
  string zone = 14;
}

message AgentCapabilities {
  bool supports_ebpf = 1;
  bool supports_tracing = 2;
  bool supports_metrics = 3;
  bool supports_logs = 4;
  bool supports_events = 5;
  bool supports_network_flow = 6;
  bool supports_process_events = 7;
  repeated string supported_protocols = 8;
  int32 max_bandwidth_mbps = 9;
  int32 max_collectors = 10;
}

// ============================================================
// 注册与认证
// ============================================================

message RegisterAgentRequest {
  AgentInfo agent_info = 1;
  string auth_token = 2;
  string signature = 3;
  string nonce = 4;
  int64 timestamp = 5;
  string public_key = 6;
}

message RegisterAgentResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  string session_id = 4;
  string assigned_edge = 5;
  int64 token_expiry = 6;
  ConfigSnapshot initial_config = 7;
  map<string, string> metadata = 8;
}

message HeartbeatRequest {
  string agent_id = 1;
  string session_id = 2;
  AgentStatus status = 3;
  ResourceUsage resources = 4;
  repeated CollectorStatus collector_status = 5;
  map<string, int64> metrics_summary = 6;
  string config_hash = 7;
}

message HeartbeatResponse {
  bool accepted = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  int64 next_heartbeat_interval = 4;
  repeated Command pending_commands = 5;
  bool config_updated = 6;
  ConfigSnapshot config_delta = 7;
}

message UnregisterAgentRequest {
  string agent_id = 1;
  string session_id = 2;
  string reason = 3;
  bool force = 4;
}

// ============================================================
// 状态与资源
// ============================================================

message AgentStatus {
  string state = 1; // running, paused, error, shutting_down, upgrading
  string message = 2;
  map<string, string> details = 3;
  google.protobuf.Timestamp timestamp = 4;
  repeated string active_collectors = 5;
  int64 uptime_seconds = 6;
}

message ResourceUsage {
  double cpu_percent = 1;
  uint64 memory_bytes = 2;
  uint64 disk_bytes = 3;
  uint32 goroutines = 4;
  uint32 open_files = 5;
  uint32 connections = 6;
  uint64 network_bytes_sent = 7;
  uint64 network_bytes_recv = 8;
  double load_average_1m = 9;
  double load_average_5m = 10;
  double load_average_15m = 11;
}

message CollectorStatus {
  string id = 1;
  string name = 2;
  string type = 3;
  bool enabled = 4;
  bool running = 5;
  google.protobuf.Timestamp start_time = 6;
  string last_error = 7;
  uint64 events_count = 8;
  uint64 drop_count = 9;
  double cpu_usage = 10;
  uint64 memory_usage = 11;
}

// ============================================================
// 指标数据
// ============================================================

message MetricBatch {
  string agent_id = 1;
  string batch_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  repeated Metric metrics = 4;
  map<string, string> metadata = 5;
  string compression = 6; // none, gzip, zstd
  string encoding = 7; // json, protobuf
  int64 sequence_number = 8;
}

message Metric {
  string name = 1;
  double value = 2;
  MetricType type = 3;
  map<string, string> tags = 4;
  google.protobuf.Timestamp timestamp = 5;
  uint64 count = 6;
  double sum = 7;
  double min = 8;
  double max = 9;
  repeated double buckets = 10;
  repeated uint64 bucket_counts = 11;
  string unit = 12;
  string description = 13;
}

enum MetricType {
  METRIC_TYPE_UNSPECIFIED = 0;
  METRIC_TYPE_GAUGE = 1;
  METRIC_TYPE_COUNTER = 2;
  METRIC_TYPE_HISTOGRAM = 3;
  METRIC_TYPE_SUMMARY = 4;
}

message SystemMetricBatch {
  string agent_id = 1;
  string batch_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  repeated SystemMetric metrics = 4;
}

message SystemMetric {
  google.protobuf.Timestamp timestamp = 1;
  string host_ip = 2;
  string hostname = 3;
  
  // CPU
  double cpu_usage = 4;
  double cpu_user = 5;
  double cpu_system = 6;
  double cpu_idle = 7;
  double cpu_iowait = 8;
  double cpu_steal = 9;
  double load_1 = 10;
  double load_5 = 11;
  double load_15 = 12;
  
  // Memory
  uint64 mem_total = 13;
  uint64 mem_used = 14;
  uint64 mem_free = 15;
  uint64 mem_buffers = 16;
  uint64 mem_cached = 17;
  uint64 mem_available = 18;
  double mem_usage = 19;
  uint64 swap_total = 20;
  uint64 swap_used = 21;
  uint64 swap_free = 22;
  double swap_usage = 23;
  
  // Disk
  uint64 disk_total = 24;
  uint64 disk_used = 25;
  uint64 disk_free = 26;
  double disk_usage = 27;
  uint64 disk_read_bytes = 28;
  uint64 disk_write_bytes = 29;
  uint64 disk_read_ops = 30;
  uint64 disk_write_ops = 31;
  uint64 disk_io_wait = 32;
  
  // Network
  uint64 net_bytes_sent = 33;
  uint64 net_bytes_recv = 34;
  uint64 net_packets_sent = 35;
  uint64 net_packets_recv = 36;
  uint64 net_err_in = 37;
  uint64 net_err_out = 38;
  uint64 net_drop_in = 39;
  uint64 net_drop_out = 40;
  uint64 net_tcp_conns = 41;
  uint64 net_udp_conns = 42;
  
  // Process
  uint32 process_total = 43;
  uint32 process_running = 44;
  uint32 process_sleeping = 45;
  uint32 process_zombie = 46;
}

// ============================================================
// 链路追踪
// ============================================================

message TraceBatch {
  string agent_id = 1;
  string batch_id = 2;
  repeated Span spans = 3;
  string service_name = 4;
  string service_version = 5;
}

message Span {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string operation_name = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Duration duration = 6;
  map<string, string> tags = 7;
  repeated SpanLog logs = 8;
  SpanContext context = 9;
  repeated SpanReference references = 10;
  int32 flags = 11;
}

message SpanContext {
  string service_name = 1;
  string service_version = 2;
  string host = 3;
  string ip = 4;
  string container_id = 5;
  string pod_name = 6;
  string namespace = 7;
  string cluster = 8;
}

message SpanLog {
  google.protobuf.Timestamp timestamp = 1;
  map<string, string> fields = 2;
}

message SpanReference {
  string trace_id = 1;
  string span_id = 2;
  string reference_type = 3; // child_of, follows_from
}

// ============================================================
// 日志数据
// ============================================================

message LogBatch {
  string agent_id = 1;
  string batch_id = 2;
  repeated LogEntry entries = 3;
  string source = 4;
}

message LogEntry {
  google.protobuf.Timestamp timestamp = 1;
  LogLevel level = 2;
  string message = 3;
  string source = 4;
  map<string, string> fields = 5;
  string trace_id = 6;
  string span_id = 7;
  string service_name = 8;
  string host = 9;
  string logger_name = 10;
  string thread_name = 11;
  string class_name = 12;
  string method_name = 13;
  int32 line_number = 14;
  map<string, string> labels = 15;
}

enum LogLevel {
  LOG_LEVEL_UNSPECIFIED = 0;
  LOG_LEVEL_DEBUG = 1;
  LOG_LEVEL_INFO = 2;
  LOG_LEVEL_WARN = 3;
  LOG_LEVEL_ERROR = 4;
  LOG_LEVEL_FATAL = 5;
}

// ============================================================
// 事件数据
// ============================================================

message EventBatch {
  string agent_id = 1;
  string batch_id = 2;
  repeated Event events = 3;
}

message Event {
  string event_id = 1;
  string event_type = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> attributes = 4;
  Severity severity = 5;
  string description = 6;
  string source = 7;
  string category = 8;
  string sub_category = 9;
  string entity_id = 10;
  string entity_type = 11;
  map<string, string> tags = 12;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARNING = 2;
  SEVERITY_ERROR = 3;
  SEVERITY_CRITICAL = 4;
}

// ============================================================
// 网络流量
// ============================================================

message NetworkFlowBatch {
  string agent_id = 1;
  string batch_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  repeated NetworkFlow flows = 4;
}

message NetworkFlow {
  int64 timestamp = 1;
  string protocol = 2;
  string source_ip = 3;
  uint32 source_port = 4;
  string dest_ip = 5;
  uint32 dest_port = 6;
  string process_name = 7;
  uint32 process_pid = 8;
  uint64 bytes_sent = 9;
  uint64 bytes_recv = 10;
  uint64 packets_sent = 11;
  uint64 packets_recv = 12;
  uint64 duration_ns = 13;
  string tcp_state = 14;
  string collector_type = 15;
  string direction = 16; // inbound, outbound, internal
  string l7_protocol = 17;
  map<string, string> tags = 18;
}

// ============================================================
// 进程事件
// ============================================================

message ProcessEventBatch {
  string agent_id = 1;
  string batch_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  repeated ProcessEvent events = 4;
}

message ProcessEvent {
  int64 timestamp = 1;
  string event_type = 2; // exec, fork, exit, clone
  uint32 pid = 3;
  uint32 ppid = 4;
  uint32 tid = 5;
  string comm = 6;
  string exe = 7;
  string cmdline = 8;
  string cwd = 9;
  uint32 uid = 10;
  uint32 gid = 11;
  int32 exit_code = 12;
  uint32 signal = 13;
  map<string, string> env = 14;
  repeated string args = 15;
  string container_id = 16;
  string pod_name = 17;
  string namespace = 18;
}

// ============================================================
// 配置管理
// ============================================================

message GetConfigRequest {
  string agent_id = 1;
  string config_version = 2;
  repeated string config_paths = 3;
}

message ConfigResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  ConfigSnapshot config = 4;
}

message UpdateConfigRequest {
  string agent_id = 1;
  string config_path = 2;
  bytes config_data = 3;
  string signature = 4;
  string version = 5;
  bool dry_run = 6;
}

message SubscribeConfigRequest {
  string agent_id = 1;
  repeated string interested_paths = 2;
  string current_version = 3;
}

message ConfigChangeEvent {
  string change_id = 1;
  string config_path = 2;
  bytes old_value = 3;
  bytes new_value = 4;
  google.protobuf.Timestamp change_time = 5;
  string changed_by = 6;
  string change_reason = 7;
}

message ConfigSnapshot {
  string version = 1;
  google.protobuf.Timestamp timestamp = 2;
  bytes config_data = 3;
  string checksum = 4;
  string format = 5; // yaml, json, toml
  map<string, string> metadata = 6;
}

// ============================================================
// 命令执行
// ============================================================

message Command {
  string command_id = 1;
  string command_type = 2;
  map<string, string> parameters = 3;
  int64 timeout_seconds = 4;
  string issued_by = 5;
  google.protobuf.Timestamp issued_at = 6;
  int32 priority = 7;
  bool async = 8;
}

message CommandRequest {
  string agent_id = 1;
  Command command = 2;
}

message CommandResponse {
  string command_id = 1;
  bool success = 2;
  ErrorCode error_code = 3;
  string error_message = 4;
  string output = 5;
  int32 exit_code = 6;
  google.protobuf.Duration execution_time = 7;
  google.protobuf.Timestamp completed_at = 8;
}

message StreamCommandRequest {
  string agent_id = 1;
  string command_filter = 2;
  repeated string command_types = 3;
}

// ============================================================
// 文件传输
// ============================================================

message FileChunk {
  string transfer_id = 1;
  string file_name = 2;
  string file_path = 3;
  uint64 offset = 4;
  bytes data = 5;
  bool is_last = 6;
  string checksum = 7;
  uint64 total_size = 8;
  uint64 chunk_index = 9;
  uint64 total_chunks = 10;
}

message FileTransferResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  string transfer_id = 4;
  uint64 bytes_received = 5;
  uint64 bytes_total = 6;
  string checksum = 7;
}

message DownloadFileRequest {
  string agent_id = 1;
  string file_path = 2;
  uint64 offset = 3;
  uint64 chunk_size = 4;
  string checksum = 5;
}

// ============================================================
// 诊断
// ============================================================

message DiagnosticsRequest {
  string agent_id = 1;
  string diagnostics_type = 2;
  int64 duration_seconds = 3;
  map<string, string> parameters = 4;
}

message DiagnosticsResponse {
  bool success = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  string diagnostics_id = 4;
  map<string, string> results = 5;
  string report_url = 6;
  bytes report_data = 7;
}

message ProfileRequest {
  string agent_id = 1;
  string profile_type = 2;
  int64 duration_seconds = 3;
  int64 sample_rate = 4;
}

message ProfileData {
  bytes data = 1;
  string profile_type = 2;
  bool is_last = 3;
  uint64 total_size = 4;
  uint64 chunk_index = 5;
}

// ============================================================
// 探针状态查询
// ============================================================

message AgentStatusRequest {
  string agent_id = 1;
}

message AgentStatusResponse {
  bool online = 1;
  ErrorCode error_code = 2;
  string error_message = 3;
  AgentInfo info = 4;
  AgentStatus status = 5;
  ResourceUsage resources = 6;
  google.protobuf.Timestamp last_heartbeat = 7;
}

message AgentMetricsRequest {
  string agent_id = 1;
  string metric_pattern = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  repeated string metric_names = 5;
}

message AgentMetricsResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
  repeated Metric metrics = 3;
  map<string, double> aggregates = 4;
}

// ============================================================
// 拓扑相关
// ============================================================

message TopologyReportRequest {
  string agent_id = 1;
  repeated TopologyEntity entities = 2;
  repeated TopologyRelation relations = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message TopologyEntity {
  string entity_id = 1;
  string entity_type = 2; // pod, vm, container, service, process
  string name = 3;
  map<string, string> attributes = 4;
  map<string, string> labels = 5;
  string parent_id = 6;
  google.protobuf.Timestamp discovered_at = 7;
}

message TopologyRelation {
  string relation_id = 1;
  string source_id = 2;
  string target_id = 3;
  string relation_type = 4; // calls, contains, runs_on, depends_on
  map<string, string> attributes = 5;
  google.protobuf.Timestamp discovered_at = 6;
}

message GetTopologyRequest {
  string agent_id = 1;
  string entity_type = 2;
  string entity_id = 3;
  int32 depth = 4;
  TimeRange time_range = 5;
}

message TopologyResponse {
  ErrorCode error_code = 1;
  string error_message = 2;
  repeated TopologyEntity entities = 3;
  repeated TopologyRelation relations = 4;
  google.protobuf.Timestamp timestamp = 5;
}


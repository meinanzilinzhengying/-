# =============================================================================
# 云内流量监测系统 (Cloud Flow Frontend) - Nginx 配置
# 版本: 2.0 (安全加固 + 性能优化)
# =============================================================================

# 工作进程设置 - 自动根据 CPU 核心数调整
worker_processes auto;
worker_cpu_affinity auto;

# 事件模块优化
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # 基础设置
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式优化
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;

    # 客户端请求限制
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # Gzip 压缩优化
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;  # 小于 1KB 不压缩
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # 安全 Headers (全局)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 隐藏 Nginx 版本信息
    server_tokens off;

    # 速率限制配置
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # 上游服务器配置
    upstream center_backend {
        server center:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP 服务器 (80 端口 - 重定向到 HTTPS)
    server {
        listen 80;
        server_name _;

        # 健康检查端点（不跳转，用于负载均衡器检查）
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # 其他请求重定向到 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS 服务器 (443 端口)
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 配置（生产环境需要替换为真实证书）
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (仅在 HTTPS 配置中启用)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # CSP (Content Security Policy)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        root /usr/share/nginx/html;
        index index.html;

        # 安全相关：禁止访问敏感文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* \.(git|svn|hg|env|ini|log|conf|key|pem)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* (composer\.|package\.|gulpfile\.|gruntfile\.|webpack\.) {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 静态资源缓存（Vite 构建的带 hash 文件名资源）
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            try_files $uri =404;
            access_log off;
        }

        # 其他静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 6M;
            add_header Cache-Control "public";
            access_log off;
        }

        # API 反向代理 -> 中心服务
        location /api/ {
            # 速率限制
            limit_req zone=api_limit burst=200 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://center_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # WebSocket 支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # 缓冲设置优化（增大缓冲区，减少磁盘 I/O）
            proxy_buffering on;
            proxy_buffer_size 16k;      # 从 4k 增加到 16k
            proxy_buffers 8 16k;        # 从 8 4k 增加到 8 16k
            proxy_busy_buffers_size 32k;
            proxy_temp_file_write_size 64k;

            # 错误处理
            proxy_intercept_errors on;
            error_page 502 503 504 = @api_error;
        }

        # API 错误处理
        location @api_error {
            internal;
            default_type application/json;
            return 503 '{"error": "Service temporarily unavailable", "code": 503}';
        }

        # Vue Router HTML5 History 模式
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }

        # 健康检查端点
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # 错误页面
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

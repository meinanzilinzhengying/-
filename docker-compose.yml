# =============================================================================
# 云内流量监测系统 (Cloud Flow) - Docker Compose 一键部署配置
# =============================================================================
# 使用方式:
#   docker compose up -d          # 启动所有服务
#   docker compose up -d prometheus grafana alertmanager  # 仅启动监控栈
#   docker compose down -v        # 停止并清除数据卷
#   docker compose logs -f        # 查看日志
#
# 监控面板:
#   Grafana:    http://localhost:3001  (admin/admin)
#   Prometheus: http://localhost:9091
#   Alertmanager: http://localhost:9094
#   Loki:       http://localhost:3100
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # TiDB 数据库
  # ---------------------------------------------------------------------------
  tidb:
    image: pingcap/tidb:v8.4.0
    container_name: cloud-flow-tidb
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"    # SQL 端口 (MySQL 兼容协议) - 仅本地访问
      - "127.0.0.1:10080:10080"  # Status 端口 - 仅本地访问
    environment:
      TZ: Asia/Shanghai
    volumes:
      - tidb-data:/var/lib/tidb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10080/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Redis (CSRF Token 和登录失败计数)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cloud-flow-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    # [安全] 设置 Redis 密码，防止未授权访问
    command: redis-server --requirepass ${REDIS_PASSWORD:?请在 .env 文件中设置 REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # 中心服务 (Center)
  # ---------------------------------------------------------------------------
  center:
    build:
      context: ./cloud-flow-center
      dockerfile: deployments/Dockerfile
    container_name: cloud-flow-center
    restart: unless-stopped
    depends_on:
      tidb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9090:8080"  # Portal HTTP
      - "9999:9090"  # gRPC
    environment:
      TZ: Asia/Shanghai
      # [安全] 生产环境必须设置 CLOUD_FLOW_DB_PASSWORD 环境变量
      CLOUD_FLOW_DSN: "root:${CLOUD_FLOW_DB_PASSWORD:-}@tcp(tidb:4000)/cloud_flow?parseTime=true&charset=utf8mb4&collation=utf8mb4_bin"
      # [安全] 生产环境必须设置强密钥，否则容器无法启动
      CLOUD_FLOW_JWT_SECRET: "${CLOUD_FLOW_JWT_SECRET:?请在 .env 文件中设置 CLOUD_FLOW_JWT_SECRET}"
      # [安全] 生产环境必须设置强密码，否则容器无法启动
      CLOUD_FLOW_ADMIN_PASSWORD: "${CLOUD_FLOW_ADMIN_PASSWORD:?请在 .env 文件中设置 CLOUD_FLOW_ADMIN_PASSWORD}"
      METRICS_PORT: "9191"
      CLOUD_FLOW_REDIS_ADDR: "redis://:${REDIS_PASSWORD}@redis:6379"
    volumes:
      - center-config:/app/configs
      - center-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # 边缘节点 (Edge)
  # ---------------------------------------------------------------------------
  edge:
    build:
      context: ./cloud-flow-edge
      dockerfile: deployments/Dockerfile
    container_name: cloud-flow-edge
    restart: unless-stopped
    depends_on:
      center:
        condition: service_healthy
    ports:
      - "10001:50051"  # gRPC Agent (探针连接)
      - "10002:9092"   # gRPC Center (中心连接) / Metrics
      - "9091:8081"   # Health
    environment:
      TZ: Asia/Shanghai
      EDGE_NODE_ID: "${EDGE_NODE_ID:-edge-node-01}"
      CENTER_ADDR: "center:9090"
      GRPC_LISTEN_PORT: "50051"
      METRICS_PORT: "9092"
      HEALTH_PORT: "8081"
      CLOUD_FLOW_API_KEY: "${CLOUD_FLOW_API_KEY:-}"
      CLOUD_FLOW_CENTER_API_KEY: "${CLOUD_FLOW_CENTER_API_KEY:-}"
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # 探针采集端 (Agent)
  # ---------------------------------------------------------------------------
  agent:
    build:
      context: ./cloud-flow-agent
      dockerfile: deployments/Dockerfile
    container_name: cloud-flow-agent
    restart: unless-stopped
    depends_on:
      edge:
        condition: service_started
    cap_add:
      - SYS_ADMIN
    # privileged: true  # 替代方案: 如需完整特权模式可取消注释
    # 注意: eBPF 需要捕获宿主机网络流量，生产环境建议使用 network_mode: "host"
    # network_mode: "host"
    environment:
      TZ: Asia/Shanghai
      PROBE_ID: "${PROBE_ID:-}"
      EDGE_ADDR: "edge:50051"
      METRICS_PORT: "9090"
      HEALTH_PORT: "8080"
      COLLECT_INTERVAL: "10"
      BATCH_SIZE: "10"
      CLOUD_FLOW_API_KEY: "${CLOUD_FLOW_API_KEY:-}"
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # 前端 (Frontend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./cloud-flow-frontend
      dockerfile: deployments/Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-/api}"
    container_name: cloud-flow-frontend
    restart: unless-stopped
    depends_on:
      center:
        condition: service_healthy
    ports:
      - "8888:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Prometheus (指标采集和存储)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cloud-flow-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Grafana (可视化仪表盘)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.3
    container_name: cloud-flow-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      TZ: Asia/Shanghai
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "${GRAFANA_ROOT_URL:-http://localhost:3001}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Alertmanager (告警管理)
  # ---------------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: cloud-flow-alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9094:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9094'
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Node Exporter (宿主机系统指标)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: cloud-flow-node-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+)($|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tmpfs|tracefs)$'
    volumes:
      - /:/host:ro,rslave
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # cAdvisor (容器指标采集)
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cloud-flow-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Loki (日志聚合)
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: cloud-flow-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - cloud-flow-net

  # ---------------------------------------------------------------------------
  # Promtail (日志采集)
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.4
    container_name: cloud-flow-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - cloud-flow-net

# =============================================================================
# 网络配置
# =============================================================================
networks:
  cloud-flow-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# 卷配置
# =============================================================================
volumes:
  tidb-data:
    driver: local
  redis-data:
    driver: local
  center-config:
    driver: local
  center-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  loki-data:
    driver: local

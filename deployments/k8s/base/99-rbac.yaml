# =============================================================================
# Cloud Flow - RBAC 配置
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-flow
  namespace: cloud-flow
  labels:
    app.kubernetes.io/name: cloud-flow
    app.kubernetes.io/component: rbac

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloud-flow
  labels:
    app.kubernetes.io/name: cloud-flow
    app.kubernetes.io/component: rbac
rules:
  # 节点信息读取（Agent 需要）
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/stats"]
    verbs: ["get", "list", "watch"]
  # Pod 信息读取
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  # 事件读取
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # ConfigMap 读取（配置热更新）
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Secret 读取（TLS 证书等）
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["cloud-flow-tls"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-flow
  labels:
    app.kubernetes.io/name: cloud-flow
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloud-flow
subjects:
  - kind: ServiceAccount
    name: cloud-flow
    namespace: cloud-flow

---
# Agent 专用 RBAC（需要更多权限）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloud-flow-agent
  labels:
    app.kubernetes.io/name: cloud-flow-agent
    app.kubernetes.io/component: rbac
rules:
  # 节点信息
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "nodes/stats", "nodes/metrics"]
    verbs: ["get", "list", "watch"]
  # Pod 信息
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "namespaces"]
    verbs: ["get", "list", "watch"]
  # 事件
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # 容器指标
  - apiGroups: ["metrics.k8s.io"]
    resources: ["*"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-flow-agent
  labels:
    app.kubernetes.io/name: cloud-flow-agent
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloud-flow-agent
subjects:
  - kind: ServiceAccount
    name: cloud-flow
    namespace: cloud-flow

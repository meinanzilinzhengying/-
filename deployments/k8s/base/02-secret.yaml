# =============================================================================
# Cloud Flow - Secret 配置（基础模板，实际部署时应替换敏感值）
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: cloud-flow-secrets
  namespace: cloud-flow
  labels:
    app.kubernetes.io/name: cloud-flow
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # 数据库密码（部署时应该替换为实际密码）
  db-password: "${DB_PASSWORD:-cloudflow123}"
  
  # Redis 密码
  redis-password: "${REDIS_PASSWORD:-}"
  
  # JWT 密钥
  jwt-secret: "${JWT_SECRET:-change-me-in-production}"
  
  # Agent 认证 Token
  agent-token: "${AGENT_TOKEN:-change-me-in-production}"
  
  # Center 认证 Token
  center-token: "${CENTER_TOKEN:-change-me-in-production}"

---
# TLS Secret（可选，用于 HTTPS/gRPC TLS）
apiVersion: v1
kind: Secret
metadata:
  name: cloud-flow-tls
  namespace: cloud-flow
  labels:
    app.kubernetes.io/name: cloud-flow
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  # 这些值是占位符，实际部署时需要替换为真实的 TLS 证书
  # 生成方式：kubectl create secret tls cloud-flow-tls --cert=path/to/cert.pem --key=path/to/key.pem -n cloud-flow
  tls.crt: ""
  tls.key: ""

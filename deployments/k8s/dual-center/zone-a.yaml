# =============================================================================
# Cloud Flow 同城双中心 - 中心A 部署配置
# =============================================================================
# 中心A (主中心) - Zone A
# 包含: Center, Edge, Redis, PostgreSQL, etcd
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: cloud-flow-zone-a
  labels:
    zone: zone-a
    site: primary

---
# ============================================================
# ConfigMap - 中心A
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: dual-center-config-a
  namespace: cloud-flow-zone-a
data:
  # Center 配置
  CENTER_ID: "center-a"
  CENTER_ROLE: "active"
  CENTER_PEER_URL: "http://center-b.cloud-flow-zone-b.svc.cluster.local:8080"
  CENTER_REGION: "same-city"
  CENTER_ZONE: "zone-a"

  # 数据库配置（主库）
  DB_HOST: "postgres-a"
  DB_PORT: "5432"
  DB_NAME: "cloudflow"
  DB_USER: "cloudflow"
  # DB_PASSWORD 从 Secret 读取

  # Redis 配置
  REDIS_ADDR: "redis-a:6379"
  # REDIS_PASSWORD 从 Secret 读取

  # etcd 配置（分布式协调）
  ETCD_ENDPOINTS: "etcd-a:2379,etcd-b:2379,etcd-c:2379"

  # 双中心同步配置
  SYNC_MODE: "semi_sync"
  SYNC_BATCH_SIZE: "500"
  SYNC_FLUSH_INTERVAL: "5s"
  SYNC_COMPRESS: "true"
  SYNC_MAX_RETRIES: "3"

  # 故障切换配置
  FAILOVER_ENABLED: "true"
  FAILOVER_MODE: "auto"
  FAILOVER_THRESHOLD: "3"
  FAILOVER_TIMEOUT: "30s"
  FAILOVER_AUTO_RECOVER: "true"
  FAILOVER_RECOVER_DELAY: "30s"
  FENCE_ENABLED: "true"

  # 全局查询配置
  GLOBAL_QUERY_ENABLED: "true"
  GLOBAL_QUERY_TIMEOUT: "10s"
  GLOBAL_QUERY_CACHE_TTL: "30s"

  # 日志配置
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

---
# ============================================================
# Secret - 中心A
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: dual-center-secrets-a
  namespace: cloud-flow-zone-a
type: Opaque
stringData:
  db-password: "${DB_PASSWORD:-cloudflow123}"
  redis-password: "${REDIS_PASSWORD:-}"
  jwt-secret: "${JWT_SECRET:-change-me-in-production}"
  replication-password: "${REPL_PASSWORD:-repl123}"
  etcd-auth: "${ETCD_AUTH:-}"

---
# ============================================================
# RBAC - 中心A
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-flow-a
  namespace: cloud-flow-zone-a

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloud-flow-a
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints", "namespaces", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["cloud-flow-tls-a"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-flow-a
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloud-flow-a
subjects:
  - kind: ServiceAccount
    name: cloud-flow-a
    namespace: cloud-flow-zone-a

---
# ============================================================
# etcd 集群 (3节点跨双中心)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd-a
  namespace: cloud-flow-zone-a
spec:
  serviceName: etcd-a
  replicas: 1
  selector:
    matchLabels:
      app: etcd
      site: zone-a
  template:
    metadata:
      labels:
        app: etcd
        site: zone-a
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-a"]
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.9
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          env:
            - name: ETCD_NAME
              value: "etcd-a"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://etcd-a.cloud-flow-zone-a.svc.cluster.local:2380"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://etcd-a.cloud-flow-zone-a.svc.cluster.local:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:2380"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_INITIAL_CLUSTER
              value: "etcd-a=http://etcd-a.cloud-flow-zone-a.svc.cluster.local:2380,etcd-b=http://etcd-b.cloud-flow-zone-b.svc.cluster.local:2380,etcd-c=http://etcd-c.cloud-flow-zone-a.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "cloud-flow-dual-center"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /etcd-data
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "etcdctl endpoint health"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: etcd-a
  namespace: cloud-flow-zone-a
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380
  selector:
    app: etcd
    site: zone-a

---
# ============================================================
# PostgreSQL-A (主库，支持流复制)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-a
  namespace: cloud-flow-zone-a
spec:
  serviceName: postgres-a
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      site: zone-a
  template:
    metadata:
      labels:
        app: postgres
        site: zone-a
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-a"]
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "cloudflow"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: db-password
            - name: POSTGRES_DB
              value: "cloudflow"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_REPLICATION_USER
              value: "replicator"
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: replication-password
          command:
            - postgres
            - -c
            - wal_level=replica
            - -c
            - max_wal_senders=10
            - -c
            - max_replication_slots=10
            - -c
            - hot_standby=on
            - -c
            - synchronous_commit=remote_apply
            - -c
            - synchronous_standby_names='FIRST 1 (postgres-b)'
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cloudflow", "-d", "cloudflow"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ssd
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-a
  namespace: cloud-flow-zone-a
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgres
    site: zone-a

---
# ============================================================
# Redis-A (主节点)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-a
  namespace: cloud-flow-zone-a
spec:
  serviceName: redis-a
  replicas: 1
  selector:
    matchLabels:
      app: redis
      site: zone-a
  template:
    metadata:
      labels:
        app: redis
        site: zone-a
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-a"]
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "4gb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - "60 1000"
            - --replica-announce-ip
            - "redis-a.cloud-flow-zone-a.svc.cluster.local"
            - --replica-announce-port
            - "6379"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-a
  namespace: cloud-flow-zone-a
spec:
  type: ClusterIP
  ports:
    - port: 6379
  selector:
    app: redis
    site: zone-a

---
# ============================================================
# Center-A (主中心控制节点)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: center-a
  namespace: cloud-flow-zone-a
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: center
      site: zone-a
  template:
    metadata:
      labels:
        app: center
        site: zone-a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      serviceAccountName: cloud-flow-a
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-a"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: center
                    site: zone-a
                topologyKey: kubernetes.io/hostname
      containers:
        - name: center
          image: ghcr.io/meinanzilinzhengying/cloudflow/center:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: dual-center-config-a
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: redis-password
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: jwt-secret
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: center-a
  namespace: cloud-flow-zone-a
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
    - name: grpc
      port: 50051
    - name: health
      port: 8081
  selector:
    app: center
    site: zone-a

---
# ============================================================
# Edge-A (主中心边缘节点)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-a
  namespace: cloud-flow-zone-a
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: edge
      site: zone-a
  template:
    metadata:
      labels:
        app: edge
        site: zone-a
    spec:
      serviceAccountName: cloud-flow-a
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-a"]
      containers:
        - name: edge
          image: ghcr.io/meinanzilinzhengying/cloudflow/edge:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: dual-center-config-a
          env:
            - name: EDGE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: EDGE_REDIS_ADDRESS
              value: "redis-a:6379"
            - name: EDGE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-a
                  key: redis-password
                  optional: true
            - name: EDGE_CENTER_ADDRESS
              value: "center-a:8080"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: edge-a
  namespace: cloud-flow-zone-a
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
    - name: grpc
      port: 50051
    - name: health
      port: 8081
  selector:
    app: edge
    site: zone-a

---
# ============================================================
# 全局入口 - 负载均衡 Service (跨双中心)
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: cloud-flow-global
  namespace: cloud-flow-zone-a
  labels:
    app: cloud-flow-global
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
  selector:
    app: center
    site: zone-a

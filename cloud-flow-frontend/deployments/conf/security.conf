# =============================================================================
# Nginx 安全配置 - 可独立引入或复制到主配置
# 文件名: security.conf
# 用途: 集中管理所有安全相关的 Nginx 配置
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 隐藏服务器信息
# -----------------------------------------------------------------------------
# 隐藏 Nginx 版本号，防止版本信息泄露
server_tokens off;

# -----------------------------------------------------------------------------
# 2. 安全 Headers (Security Headers)
# -----------------------------------------------------------------------------
# 这些 Headers 可以增强浏览器安全，防止多种攻击

# X-Frame-Options: 防止点击劫持 (Clickjacking)
# SAMEORIGIN: 只允许同源页面嵌入
add_header X-Frame-Options "SAMEORIGIN" always;

# X-Content-Type-Options: 防止 MIME 类型嗅探
# nosniff: 强制浏览器使用 Content-Type 声明的类型
add_header X-Content-Type-Options "nosniff" always;

# X-XSS-Protection: 启用浏览器 XSS 过滤器
# 1; mode=block: 启用并在检测到攻击时阻止页面加载
add_header X-XSS-Protection "1; mode=block" always;

# Referrer-Policy: 控制 Referer 头的发送
# strict-origin-when-cross-origin: 同源发送完整 URL，跨域只发送 origin
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy: 控制浏览器功能权限
# 禁用地理位置、麦克风、摄像头等敏感功能
default_type application/octet-stream;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

# -----------------------------------------------------------------------------
# 3. 敏感文件访问限制
# -----------------------------------------------------------------------------
# 禁止访问隐藏文件 (.htaccess, .git 等)
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问版本控制文件
location ~* \.(git|svn|hg)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问配置文件和密钥
location ~* \.(env|ini|conf|config|key|pem|crt|p12|pfx)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问日志文件
location ~* \.(log|logs)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问构建工具配置文件
location ~* (composer\.|package\.|gulpfile\.|gruntfile\.|webpack\.|rollup\.|vite\.|tsconfig\.) {
    deny all;
    access_log off;
    log_not_found off;
}

# -----------------------------------------------------------------------------
# 4. 速率限制配置 (Rate Limiting)
# -----------------------------------------------------------------------------
# 定义限流区域，需要在 http 块中使用

# API 接口限流: 每秒 100 请求，突发 200
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

# 普通页面限流: 每秒 50 请求，突发 100
# limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

# 连接数限制: 每个 IP 最多 50 个并发连接
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# 使用示例 (在 server 或 location 块中):
# limit_req zone=api_limit burst=200 nodelay;
# limit_conn conn_limit 50;

# -----------------------------------------------------------------------------
# 5. SSL/TLS 安全配置
# -----------------------------------------------------------------------------
# 这些配置用于 HTTPS 服务器块

# 推荐的 SSL 协议版本 (禁用 SSLv3, TLSv1.0, TLSv1.1)
# ssl_protocols TLSv1.2 TLSv1.3;

# 推荐的加密套件 (前向安全，禁用弱加密)
# ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

# 优先使用服务器端的加密套件顺序
# ssl_prefer_server_ciphers off;

# SSL 会话缓存
# ssl_session_timeout 1d;
# ssl_session_cache shared:SSL:50m;
# ssl_session_tickets off;

# HSTS (HTTP Strict Transport Security)
# 强制浏览器使用 HTTPS，有效期 2 年，包含子域，允许预加载
# add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# -----------------------------------------------------------------------------
# 6. Content Security Policy (CSP)
# -----------------------------------------------------------------------------
# 控制页面可以加载哪些资源，防止 XSS 和数据注入攻击
# 根据实际应用需求调整策略

# 基础 CSP (适用于 Vue/React 等前端应用)
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' ws: wss:; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

# 严格 CSP (需要移除 'unsafe-inline' 和 'unsafe-eval')
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

# -----------------------------------------------------------------------------
# 7. 其他安全设置
# -----------------------------------------------------------------------------

# 限制请求体大小，防止大文件上传攻击
# client_max_body_size 50m;

# 限制请求头大小，防止缓冲区溢出
# client_header_buffer_size 4k;
# large_client_header_buffers 4 8k;

# 禁用不必要的 HTTP 方法
# if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$ ) {
#     return 444;
# }

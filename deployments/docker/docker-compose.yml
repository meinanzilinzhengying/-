# Cloud Flow Agent - 高可用部署配置
# 支持单节点、多节点、同城双中心部署

version: '3.8'

# ==================== 通用配置 ====================
x-common-env: &common-env
  TZ: Asia/Shanghai
  CLOUD_FLOW_LOG_LEVEL: info
  CLOUD_FLOW_LOG_FORMAT: json

x-healthcheck: &default-healthcheck
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 30s

x-deploy-defaults: &deploy-defaults
  replicas: 2
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
  rollback_config:
    parallelism: 1
    delay: 10s
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

# ==================== 服务定义 ====================
services:
  # ------------------------------------------------
  # Agent 服务（主服务）
  # ------------------------------------------------
  agent:
    image: cloud-flow-agent:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-}
        GIT_COMMIT: ${GIT_COMMIT:-}
    container_name: cloud-flow-agent
    hostname: cloud-flow-agent
    restart: unless-stopped
    privileged: true  # eBPF需要特权模式
    pid: host         # 需要访问宿主进程命名空间
    network_mode: host  # 网络采集需要host网络
    environment:
      <<: *common-env
      CLOUD_FLOW_CONFIG: /etc/cloud-flow/agent.yaml
      CLOUD_FLOW_CENTER: ${CENTER_URL:-http://center:8080}
      CLOUD_FLOW_EDGE: ${EDGE_URL:-http://edge:9090}
      CLOUD_FLOW_AGENT_ID: ${AGENT_ID:-}
      CLOUD_FLOW_TENANT_ID: ${TENANT_ID:-default}
      CLOUD_FLOW_REGION: ${REGION:-default}
      CLOUD_FLOW_ZONE: ${ZONE:-default}
    volumes:
      - ./config/agent.yaml:/etc/cloud-flow/agent.yaml:ro
      - ./data:/var/lib/cloud-flow
      - ./logs:/var/log/cloud-flow
      - /sys/kernel/debug:/sys/kernel/debug:ro  # eBPF需要
      - /proc:/proc:ro
      - /sys:/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # 容器监控
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "pgrep", "-x", "cloud-flow-agent"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ------------------------------------------------
  # Edge 服务（边缘节点）
  # ------------------------------------------------
  edge:
    image: cloud-flow-edge:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.edge
    container_name: cloud-flow-edge
    hostname: cloud-flow-edge
    restart: unless-stopped
    ports:
      - "9090:9090"
      - "9091:9091"
    environment:
      <<: *common-env
      EDGE_ID: ${EDGE_ID:-edge-01}
      EDGE_REGION: ${REGION:-default}
      EDGE_ZONE: ${ZONE:-default}
      REDIS_ADDR: redis:6379
      POSTGRES_ADDR: postgres:5432
    volumes:
      - ./config/edge.yaml:/etc/cloud-flow/edge.yaml:ro
      - ./data/edge:/var/lib/cloud-flow/edge
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ------------------------------------------------
  # Center 服务（控制中心）
  # ------------------------------------------------
  center:
    image: cloud-flow-center:${VERSION:-latest}
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.center
    container_name: cloud-flow-center
    hostname: cloud-flow-center
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50051:50051"  # gRPC
    environment:
      <<: *common-env
      CENTER_ID: ${CENTER_ID:-center-01}
      REDIS_ADDR: redis:6379
      POSTGRES_ADDR: postgres:5432
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-me}
    volumes:
      - ./config/center.yaml:/etc/cloud-flow/center.yaml:ro
      - ./data/center:/var/lib/cloud-flow/center
    healthcheck:
      <<: *default-healthcheck
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    deploy:
      <<: *deploy-defaults
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  # ------------------------------------------------
  # Redis（缓存/消息队列）
  # ------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cloud-flow-redis
    hostname: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------
  # PostgreSQL（元数据存储）
  # ------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: cloud-flow-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-cloudflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cloudflow123}
      POSTGRES_DB: ${DB_NAME:-cloudflow}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cloudflow} -d ${DB_NAME:-cloudflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------
  # Prometheus（监控）
  # ------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: cloud-flow-prometheus
    hostname: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------
  # Grafana（可视化）
  # ------------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: cloud-flow-grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    depends_on:
      - prometheus
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ------------------------------------------------
  # Nginx（负载均衡/反向代理）
  # ------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: cloud-flow-nginx
    hostname: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
    depends_on:
      - center
      - edge
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ==================== 数据卷 ====================
volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ==================== 网络 ====================
networks:
  default:
    name: cloud-flow-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

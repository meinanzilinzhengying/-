# 探针配置
#
# ⚠️ 安全警告：API Key 安全加载方式（按优先级排序）
# 1. CLOUD_FLOW_API_KEY_FILE - 从文件读取（推荐用于 Docker Secrets / K8s Secrets）
#    示例: export CLOUD_FLOW_API_KEY_FILE=/run/secrets/api-key
# 2. CLOUD_FLOW_API_KEY - 直接环境变量（适合 CI/CD）
#    示例: export CLOUD_FLOW_API_KEY=your-secret-key
# 3. 本配置文件 - 仅用于开发环境，生产环境请勿在配置文件中写入明文 API Key
# 4. 空值 - 如果以上都未配置，系统会尝试连接，但可能因认证失败被拒绝

probe_id: ""                  # 留空则自动生成
edge_addr: "edge:50051"
metrics_port: "9090"           # Prometheus 指标端口（可通过 METRICS_PORT 环境变量覆盖）
health_port: "8080"            # 健康检查端口
collect_interval: 10          # 采集间隔（秒）
batch_size: 10                # 批量发送阈值（降低以减少首次发送等待时间）

# ⚠️ 安全警告：以下 API Key 配置仅用于开发环境
# 生产环境请使用环境变量加载
# 详见文件顶部注释

# API Key 认证（必须与边缘节点配置的 api_key 一致）
# 建议通过 CLOUD_FLOW_API_KEY_FILE 或 CLOUD_FLOW_API_KEY 环境变量设置
api_key: ""

# TLS 配置（默认关闭，生产环境建议启用；留空证书路径则自动使用内置自签名证书）
tls:
  enabled: false
  server_name: ""
  ca_cert: ""
  client_cert: ""
  client_key: ""

# 连接配置
#max_retries: 3              # 最大重试次数（0 = 无限重试，默认 0）
#connect_timeout: 30         # 连接超时时间（秒，默认 30）

# 网络配置
network:
  # 管理网卡配置 - 指定用于数据传输的管理网卡，确保数据走管理网，不占业务网
  # 留空则采集所有网卡流量，但建议生产环境明确指定管理网卡
  # 示例: mgmt_iface: "eth0" 或 mgmt_iface: "ens192"
  mgmt_iface: ""
  
  # 本地地址绑定 - 指定gRPC客户端绑定的本地IP地址，确保使用管理网IP连接Edge
  # 示例: local_addr: "192.168.1.100:0" (0表示让系统自动选择端口)
  local_addr: ""
  
  # 数据发送网卡优先级（多网卡环境下）
  # 如果系统有多张网卡，优先使用此网卡发送监控数据
  preferred_source_iface: ""

# eBPF 采集配置
ebpf:
  enabled: true               # 启用eBPF采集
  
  # TCP深度指标采集配置
  tcp_metrics:
    enabled: true             # 启用TCP深度指标采集
    
    # TCP建连时延采集
    # 跟踪TCP三次握手过程，计算建连时延
    connect_latency: true
    
    # TCP重传率采集
    # 跟踪tcp_retransmit_skb内核函数，统计重传次数
    retransmit: true
    
    # 零窗口事件采集
    # 检测TCP零窗口通告事件
    zero_window: true
    
    # 队列溢出事件采集
    # 检测SYN队列/Accept队列溢出
    queue_overflow: true
    
    # 连接失败次数采集
    # 统计TCP连接失败事件
    connection_fail: true
  
  # HTTP应用层指标采集配置
  http_metrics:
    enabled: true             # 启用HTTP应用层指标采集
    
    # 请求成功率采集
    # 统计HTTP 2xx响应占总响应的比例
    success_rate: true
    
    # 响应时延采集
    # 跟踪HTTP请求-响应时间，计算平均时延和最大时延
    response_latency: true
    
    # 异常比例采集
    # 统计HTTP 4xx/5xx响应占总响应的比例
    error_rate: true
    
    # 请求数采集
    # 保留：统计HTTP请求总数
    request_count: true
    
    # 响应数采集
    # 保留：统计HTTP响应总数
    response_count: true
  
  # 保留的基础流量采集（吞吐量、带宽占用）
  # 这些指标通过TC类型eBPF程序采集
  base_traffic:
    enabled: true             # 启用基础流量采集
    collect_bytes: true       # 采集字节数（带宽占用）
    collect_packets: true     # 采集包数

  # 协议全字段解析配置
  # 启用后可采集HTTP/DNS/MySQL等协议的完整字段信息
  protocol_parsing:
    enabled: false            # 启用协议全字段解析（默认关闭，需要较高性能开销）
    
    # HTTP全字段解析
    # 采集HTTP请求的方法、路径、Host、Cookie、User-Agent、状态码等完整信息
    http_full: false
    
    # DNS全字段解析
    # 采集DNS查询的域名、记录类型、TTL、响应码等完整信息
    dns_full: false
    
    # MySQL全字段解析
    # 采集MySQL命令、SQL语句、错误码、影响行数等完整信息
    mysql_full: false

# 采集开关
collect:
  cpu: true
  memory: true
  network: true
  disk: false

log:
  level: info
  format: json

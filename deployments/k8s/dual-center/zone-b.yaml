# =============================================================================
# Cloud Flow 同城双中心 - 中心B 部署配置
# =============================================================================
# 中心B (备中心) - Zone B
# 包含: Center, Edge, Redis, PostgreSQL (备库), etcd
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: cloud-flow-zone-b
  labels:
    zone: zone-b
    site: secondary

---
# ============================================================
# ConfigMap - 中心B
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: dual-center-config-b
  namespace: cloud-flow-zone-b
data:
  CENTER_ID: "center-b"
  CENTER_ROLE: "standby"
  CENTER_PEER_URL: "http://center-a.cloud-flow-zone-a.svc.cluster.local:8080"
  CENTER_REGION: "same-city"
  CENTER_ZONE: "zone-b"

  # 数据库配置（备库，流复制）
  DB_HOST: "postgres-b"
  DB_PORT: "5432"
  DB_NAME: "cloudflow"
  DB_USER: "cloudflow"

  # Redis 配置（从节点）
  REDIS_ADDR: "redis-b:6379"

  # etcd 配置
  ETCD_ENDPOINTS: "etcd-a:2379,etcd-b:2379,etcd-c:2379"

  # 双中心同步配置
  SYNC_MODE: "semi_sync"
  SYNC_BATCH_SIZE: "500"
  SYNC_FLUSH_INTERVAL: "5s"
  SYNC_COMPRESS: "true"
  SYNC_MAX_RETRIES: "3"

  # 故障切换配置
  FAILOVER_ENABLED: "true"
  FAILOVER_MODE: "auto"
  FAILOVER_THRESHOLD: "3"
  FAILOVER_TIMEOUT: "30s"
  FAILOVER_AUTO_RECOVER: "true"
  FAILOVER_RECOVER_DELAY: "30s"
  FENCE_ENABLED: "true"

  # 全局查询配置
  GLOBAL_QUERY_ENABLED: "true"
  GLOBAL_QUERY_TIMEOUT: "10s"
  GLOBAL_QUERY_CACHE_TTL: "30s"

  LOG_LEVEL: "info"
  LOG_FORMAT: "json"

---
# ============================================================
# Secret - 中心B
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: dual-center-secrets-b
  namespace: cloud-flow-zone-b
type: Opaque
stringData:
  db-password: "${DB_PASSWORD:-cloudflow123}"
  redis-password: "${REDIS_PASSWORD:-}"
  jwt-secret: "${JWT_SECRET:-change-me-in-production}"
  replication-password: "${REPL_PASSWORD:-repl123}"

---
# ============================================================
# RBAC - 中心B
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-flow-b
  namespace: cloud-flow-zone-b

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloud-flow-b
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "services", "endpoints", "namespaces", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["cloud-flow-tls-b"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloud-flow-b
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloud-flow-b
subjects:
  - kind: ServiceAccount
    name: cloud-flow-b
    namespace: cloud-flow-zone-b

---
# ============================================================
# etcd-B (跨中心集群节点)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd-b
  namespace: cloud-flow-zone-b
spec:
  serviceName: etcd-b
  replicas: 1
  selector:
    matchLabels:
      app: etcd
      site: zone-b
  template:
    metadata:
      labels:
        app: etcd
        site: zone-b
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-b"]
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.9
          ports:
            - name: client
              containerPort: 2379
            - name: peer
              containerPort: 2380
          env:
            - name: ETCD_NAME
              value: "etcd-b"
            - name: ETCD_INITIAL_ADVERTISE_PEER_URLS
              value: "http://etcd-b.cloud-flow-zone-b.svc.cluster.local:2380"
            - name: ETCD_ADVERTISE_CLIENT_URLS
              value: "http://etcd-b.cloud-flow-zone-b.svc.cluster.local:2379"
            - name: ETCD_LISTEN_PEER_URLS
              value: "http://0.0.0.0:2380"
            - name: ETCD_LISTEN_CLIENT_URLS
              value: "http://0.0.0.0:2379"
            - name: ETCD_INITIAL_CLUSTER
              value: "etcd-a=http://etcd-a.cloud-flow-zone-a.svc.cluster.local:2380,etcd-b=http://etcd-b.cloud-flow-zone-b.svc.cluster.local:2380,etcd-c=http://etcd-c.cloud-flow-zone-a.svc.cluster.local:2380"
            - name: ETCD_INITIAL_CLUSTER_STATE
              value: "new"
            - name: ETCD_INITIAL_CLUSTER_TOKEN
              value: "cloud-flow-dual-center"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /etcd-data
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "etcdctl endpoint health"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: etcd-b
  namespace: cloud-flow-zone-b
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380
  selector:
    app: etcd
    site: zone-b

---
# ============================================================
# PostgreSQL-B (备库，流复制从中心A)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-b
  namespace: cloud-flow-zone-b
spec:
  serviceName: postgres-b
  replicas: 1
  selector:
    matchLabels:
      app: postgres
      site: zone-b
  template:
    metadata:
      labels:
        app: postgres
        site: zone-b
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-b"]
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "cloudflow"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: db-password
            - name: POSTGRES_DB
              value: "cloudflow"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_REPLICATION_USER
              value: "replicator"
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: replication-password
            - name: PG_STANDBY
              value: "true"
          command:
            - postgres
            - -c
            - wal_level=replica
            - -c
            - hot_standby=on
            - -c
            - primary_conninfo=host=postgres-a.cloud-flow-zone-a.svc.cluster.local port=5432 user=replicator password=${REPL_PASSWORD:-repl123}
            - -c
            - promote_trigger_file=/tmp/promote
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 8Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cloudflow", "-d", "cloudflow"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  if [ -f /tmp/promote ]; then
                    pg_isready -U cloudflow -d cloudflow
                  else
                    # 备库只读检查
                    psql -U cloudflow -d cloudflow -c "SELECT pg_is_in_recovery()" | grep -q "t"
                  fi
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ssd
        resources:
          requests:
            storage: 100Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-b
  namespace: cloud-flow-zone-b
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgres
    site: zone-b

---
# ============================================================
# Redis-B (从节点，复制中心A)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-b
  namespace: cloud-flow-zone-b
spec:
  serviceName: redis-b
  replicas: 1
  selector:
    matchLabels:
      app: redis
      site: zone-b
  template:
    metadata:
      labels:
        app: redis
        site: zone-b
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-b"]
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "4gb"
            - --maxmemory-policy
            - allkeys-lru
            - --replicaof
            - redis-a.cloud-flow-zone-a.svc.cluster.local
            - "6379"
            - --replica-announce-ip
            - redis-b.cloud-flow-zone-b.svc.cluster.local
            - --replica-announce-port
            - "6379"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis-b
  namespace: cloud-flow-zone-b
spec:
  type: ClusterIP
  ports:
    - port: 6379
  selector:
    app: redis
    site: zone-b

---
# ============================================================
# Center-B (备中心控制节点)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: center-b
  namespace: cloud-flow-zone-b
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: center
      site: zone-b
  template:
    metadata:
      labels:
        app: center
        site: zone-b
    spec:
      serviceAccountName: cloud-flow-b
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-b"]
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: center
                    site: zone-b
                topologyKey: kubernetes.io/hostname
      containers:
        - name: center
          image: ghcr.io/meinanzilinzhengying/cloudflow/center:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: dual-center-config-b
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: db-password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: redis-password
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: jwt-secret
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: center-b
  namespace: cloud-flow-zone-b
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
    - name: grpc
      port: 50051
    - name: health
      port: 8081
  selector:
    app: center
    site: zone-b

---
# ============================================================
# Edge-B (备中心边缘节点)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-b
  namespace: cloud-flow-zone-b
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: edge
      site: zone-b
  template:
    metadata:
      labels:
        app: edge
        site: zone-b
    spec:
      serviceAccountName: cloud-flow-b
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: ["zone-b"]
      containers:
        - name: edge
          image: ghcr.io/meinanzilinzhengying/cloudflow/edge:latest
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: health
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: dual-center-config-b
          env:
            - name: EDGE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: EDGE_REDIS_ADDRESS
              value: "redis-b:6379"
            - name: EDGE_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dual-center-secrets-b
                  key: redis-password
                  optional: true
            - name: EDGE_CENTER_ADDRESS
              value: "center-b:8080"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: edge-b
  namespace: cloud-flow-zone-b
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
    - name: grpc
      port: 50051
    - name: health
      port: 8081
  selector:
    app: edge
    site: zone-b

---
# ============================================================
# 全局入口 - 中心B 负载均衡
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: cloud-flow-global
  namespace: cloud-flow-zone-b
  labels:
    app: cloud-flow-global
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
  selector:
    app: center
    site: zone-b
